<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Follow-Up Desk</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap');

html,body{margin:0;padding:0;}
*{box-sizing:border-box;}

.fd-root{
  --paper:#efe7d8; --surface:#fbf8f1; --ink:#23201a; --muted:#6f6557;
  --line:#ddd2bd; --accent:#a8442a; --accent-d:#8a3620;
  font-family:'IBM Plex Sans',sans-serif; color:var(--ink);
  background:var(--paper);
  background-image:radial-gradient(circle at 18% 12%, #f6f0e3 0%, transparent 55%),
                   radial-gradient(circle at 88% 0%, #f1e9da 0%, transparent 45%);
  min-height:100vh; width:100%;
}
.fd-wrap{max-width:760px; margin:0 auto; padding:40px 22px 60px;}

.fd-head{display:flex; justify-content:space-between; align-items:flex-start; gap:16px; margin-bottom:26px;}
.fd-kicker{font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.22em; color:var(--accent); margin-bottom:8px;}
.fd-title{font-family:'Fraunces',serif; font-weight:600; font-size:42px; line-height:1; margin:0 0 12px; letter-spacing:-.01em;}
.fd-sub{margin:0; font-size:14.5px; line-height:1.55; color:var(--muted); max-width:54ch;}
.fd-head-actions{flex-shrink:0;}

.fd-stats{display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:24px;}
.fd-stat{background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:16px 18px; display:flex; flex-direction:column; gap:4px;}
.fd-stat-n{font-family:'Fraunces',serif; font-size:34px; font-weight:600; line-height:1;}
.fd-stat-l{font-size:12px; color:var(--muted); line-height:1.3;}

.fd-toolbar{display:flex; justify-content:space-between; align-items:center; gap:14px; margin-bottom:18px; flex-wrap:wrap;}
.fd-tabs{display:flex; gap:4px; background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:4px;}
.fd-tab{border:none; background:none; font-family:inherit; font-size:13px; color:var(--muted); padding:7px 12px; border-radius:8px; cursor:pointer; display:flex; align-items:center; gap:7px; transition:all .15s;}
.fd-tab:hover{color:var(--ink);}
.fd-tab.active{background:var(--ink); color:var(--paper);}
.fd-tab-n{font-family:'IBM Plex Mono',monospace; font-size:11px; opacity:.7;}
.fd-nav{display:flex; gap:4px; margin-bottom:22px; border-bottom:1px solid var(--line);}
.fd-nav-btn{display:inline-flex; align-items:center; gap:7px; background:none; border:none; border-bottom:2px solid transparent; font-family:inherit; font-size:14px; color:var(--muted); padding:10px 8px; margin-bottom:-1px; cursor:pointer; transition:all .15s;}
.fd-nav-btn:hover{color:var(--ink);}
.fd-nav-btn.active{color:var(--ink); border-bottom-color:var(--accent); font-weight:500;}
.fd-sortbar{display:flex; align-items:center; gap:10px; margin-bottom:16px; flex-wrap:wrap;}
.fd-sort-label{font-size:12.5px; color:var(--muted);}
.fd-select{font-family:inherit; font-size:13px; color:var(--ink); background:#fdfcf8; border:1px solid var(--line); border-radius:9px; padding:8px 10px; cursor:pointer;}
.fd-select:focus{outline:none; border-color:var(--accent);}
.fd-group-head{font-family:'Fraunces',serif; font-size:17px; font-weight:600; margin:8px 2px 0; padding-top:8px; letter-spacing:.01em;}

.fd-btn{font-family:inherit; font-size:13.5px; font-weight:500; border-radius:10px; padding:9px 15px; cursor:pointer; display:inline-flex; align-items:center; gap:7px; border:1px solid transparent; transition:all .15s;}
.fd-btn.sm{font-size:12.5px; padding:7px 11px; border-radius:9px;}
.fd-btn.primary{background:var(--accent); color:#fdfbf6; box-shadow:0 1px 0 var(--accent-d);}
.fd-btn.primary:hover{background:var(--accent-d);}
.fd-btn.ghost{background:transparent; color:var(--ink); border-color:var(--line);}
.fd-btn.ghost:hover{background:#f3ecdd; border-color:#cdbfa4;}

.fd-icon-btn{background:var(--surface); border:1px solid var(--line); border-radius:10px; width:38px; height:38px; display:inline-flex; align-items:center; justify-content:center; cursor:pointer; color:var(--ink); transition:all .15s;}
.fd-icon-btn.sm{width:32px; height:32px; border-radius:8px;}
.fd-icon-btn:hover{background:#f3ecdd; border-color:#cdbfa4;}
.fd-icon-btn.danger:hover{color:var(--accent); border-color:var(--accent);}

.fd-panel{background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:20px; margin-bottom:20px; animation:fdIn .2s ease;}
.fd-panel-head{display:flex; justify-content:space-between; align-items:center; font-family:'Fraunces',serif; font-size:18px; font-weight:600; margin-bottom:16px;}
.fd-panel-foot{margin-top:16px; padding-top:14px; border-top:1px solid var(--line);}
.fd-label{display:block; font-size:12px; color:var(--muted); margin:0 0 6px; font-weight:500;}
.fd-hint{color:#a59a82; font-weight:400;}
.fd-input{width:100%; font-family:inherit; font-size:14px; color:var(--ink); background:#fdfcf8; border:1px solid var(--line); border-radius:10px; padding:10px 12px; transition:border .15s;}
.fd-input:focus{outline:none; border-color:var(--accent);}
.fd-input.short{max-width:120px;}
.fd-input.area{font-family:inherit; line-height:1.5; resize:vertical; margin-bottom:14px;}
.fd-grid{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
.fd-combo{position:relative;}
.fd-suggest{position:absolute; top:100%; left:0; right:0; margin-top:4px; background:var(--surface); border:1px solid var(--line); border-radius:10px; box-shadow:0 10px 28px rgba(0,0,0,.14); z-index:30; max-height:212px; overflow-y:auto; padding:4px;}
.fd-suggest-item{display:flex; flex-direction:column; gap:1px; width:100%; text-align:left; background:none; border:none; font-family:inherit; padding:8px 10px; border-radius:7px; cursor:pointer;}
.fd-suggest-item:hover{background:#f3ecdd;}
.fd-suggest-email{font-size:12.5px; font-family:'IBM Plex Mono',monospace; color:var(--ink);}
.fd-suggest-name{font-size:11.5px; color:var(--muted);}
.fd-seg{display:inline-flex; gap:4px; background:#f3ecdd; border:1px solid var(--line); border-radius:10px; padding:4px; flex-wrap:wrap;}
.fd-seg-btn{border:none; background:none; font-family:inherit; font-size:12.5px; color:var(--muted); padding:7px 13px; border-radius:7px; cursor:pointer; transition:all .15s;}
.fd-seg-btn:hover{color:var(--ink);}
.fd-seg-btn.active{background:var(--surface); color:var(--ink); box-shadow:0 1px 2px rgba(0,0,0,.07);}
.fd-seg-btn.cap{text-transform:capitalize;}
.fd-preview{white-space:pre-wrap; font-size:13px; line-height:1.6; color:var(--ink); background:#fdfcf8; border:1px solid var(--line); border-radius:10px; padding:14px 16px;}
.fd-form-foot{display:flex; justify-content:flex-end; gap:10px; margin-top:18px;}

.fd-list{display:flex; flex-direction:column; gap:12px;}
.fd-card{display:flex; background:var(--surface); border:1px solid var(--line); border-radius:14px; overflow:hidden; animation:fdIn .25s ease;}
.fd-card-bar{width:5px; flex-shrink:0;}
.fd-card-body{padding:16px 18px; flex:1; min-width:0;}
.fd-card-top{display:flex; justify-content:space-between; align-items:flex-start; gap:12px;}
.fd-who{display:flex; flex-direction:column; min-width:0;}
.fd-name{font-family:'Fraunces',serif; font-size:18px; font-weight:600; line-height:1.2;}
.fd-email{font-size:12.5px; color:var(--muted); font-family:'IBM Plex Mono',monospace; margin-top:2px; word-break:break-all;}
.fd-company{font-size:12px; color:var(--accent); font-weight:600; margin-top:3px; letter-spacing:.02em;}
.fd-badge{flex-shrink:0; display:inline-flex; align-items:center; gap:5px; font-size:11.5px; font-weight:500; border:1px solid; border-radius:999px; padding:4px 10px; background:#fdfcf8; white-space:nowrap;}
.fd-subject{margin-top:10px; font-size:14px; font-weight:500;}
.fd-notes{margin-top:3px; font-size:13px; color:var(--muted);}
.fd-meta{margin-top:10px; font-size:12px; color:var(--muted); font-family:'IBM Plex Mono',monospace; display:flex; flex-wrap:wrap; gap:6px; align-items:center;}
.fd-dot{opacity:.5;}
.fd-actions{margin-top:14px; display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
.fd-spacer{flex:1;}

.fd-empty{text-align:center; color:var(--muted); padding:48px 20px; display:flex; flex-direction:column; align-items:center; gap:12px; font-size:14px;}

.fd-foot{margin-top:30px; padding-top:18px; border-top:1px solid var(--line); font-size:12px; color:var(--muted); display:flex; align-items:flex-start; gap:8px; line-height:1.5;}

.fd-link-danger{background:none; border:none; color:var(--accent); font-family:inherit; font-size:12.5px; cursor:pointer; display:inline-flex; align-items:center; gap:6px; padding:0;}
.fd-link-danger:hover{text-decoration:underline;}

.fd-toast{position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--ink); color:var(--paper); font-size:13px; padding:11px 18px; border-radius:10px; box-shadow:0 8px 24px rgba(0,0,0,.18); animation:fdIn .2s ease; z-index:50;}

@keyframes fdIn{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;}}

@media(max-width:560px){
  .fd-wrap{padding:28px 16px 48px;}
  .fd-stats{grid-template-columns:1fr;}
  .fd-grid{grid-template-columns:1fr;}
  .fd-title{font-size:32px;}
  .fd-toolbar{flex-direction:column; align-items:stretch;}
  .fd-tabs{overflow-x:auto;}
  .fd-btn{justify-content:center;}
}
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo } = React;

// ---------- inline icons (no external icon library needed) ----------
const Svg = ({ children, size = 18 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor"
       strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{children}</svg>
);
const Plus = (p) => <Svg {...p}><line x1="5" y1="12" x2="19" y2="12"/><line x1="12" y1="5" x2="12" y2="19"/></Svg>;
const Mail = (p) => <Svg {...p}><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 6L2 7"/></Svg>;
const Copy = (p) => <Svg {...p}><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></Svg>;
const Check = (p) => <Svg {...p}><polyline points="20 6 9 17 4 12"/></Svg>;
const Clock = (p) => <Svg {...p}><circle cx="12" cy="12" r="10"/><polyline points="12 7 12 12 15 14"/></Svg>;
const AlertCircle = (p) => <Svg {...p}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></Svg>;
const CalendarClock = (p) => <Svg {...p}><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></Svg>;
const Trash2 = (p) => <Svg {...p}><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></Svg>;
const Pencil = (p) => <Svg {...p}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></Svg>;
const SettingsIcon = (p) => <Svg {...p}><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></Svg>;
const X = (p) => <Svg {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></Svg>;
const RotateCcw = (p) => <Svg {...p}><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></Svg>;
const Inbox = (p) => <Svg {...p}><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></Svg>;
const Send = (p) => <Svg {...p}><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></Svg>;
const FileText = (p) => <Svg {...p}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="13" y2="17"/></Svg>;

// ---------- date helpers ----------
const MS_DAY = 86400000;
const todayStr = () => new Date().toISOString().slice(0, 10);
const parseDate = (s) => new Date(s + "T00:00:00");
const addDays = (s, n) => { const d = parseDate(s); d.setDate(d.getDate() + n); return d.toISOString().slice(0, 10); };
const daysBetween = (a, b) => Math.round((parseDate(b) - parseDate(a)) / MS_DAY);
const prettyDate = (s) => parseDate(s).toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });

const DEFAULT_SETTINGS = {
  defaultInterval: 4,
  mode: "varied",
  tone: "professional",
  template:
    "Dear {name},\n\nI am writing to follow up on my previous email regarding {subject}. At your earliest convenience, could you please provide the outstanding items: {notes}?\n\nPlease let me know if you require any further information from me.\n\n{signature}",
  signature: "Best regards,\n[Your name]",
};

// ---------- phrasing pools (all professional; three registers) ----------
const TONE_LABELS = { professional: "Standard", warm: "Cordial", concise: "Brief" };
const TONE_ORDER = ["professional", "warm", "concise"];

const VARIANTS = {
  professional: {
    greet: [
      "Hi {name},",
      "Hello {name},",
      "Dear {name},",
      "Hi {name}, I hope this message finds you well.",
    ],
    openFirst: [
      "I am writing to follow up on my previous email regarding {subject}.",
      "I wanted to follow up on {subject} from my earlier message.",
      "I am following up on my note regarding {subject}.",
      "I am reaching out again concerning {subject}.",
    ],
    openAgain: [
      "I wanted to follow up once more regarding {subject}.",
      "I am following up again on {subject}, as I have not yet received a response.",
      "I am checking in a second time on the status of {subject}.",
      "I am circling back on {subject}, which remains outstanding.",
    ],
    ask: [
      "Could you please provide {notes} at your earliest convenience?",
      "I would appreciate it if you could send over {notes}.",
      "When possible, please forward {notes} so that I can proceed.",
      "Kindly share {notes} when you have an opportunity.",
    ],
    close: [
      "Please let me know if you require anything further from me.",
      "Thank you for your attention to this matter.",
      "I appreciate your help and look forward to your reply.",
      "Please do not hesitate to reach out with any questions.",
    ],
  },
  warm: {
    greet: [
      "Hi {name},",
      "Hello {name},",
      "Hi {name}, I hope you are doing well.",
      "Hi {name}, I hope you are having a good week.",
    ],
    openFirst: [
      "I wanted to follow up on my earlier email regarding {subject}.",
      "I am circling back on {subject}, in case my previous message was missed.",
      "I am checking in regarding {subject}.",
      "I wanted to touch base about {subject} when you have a moment.",
    ],
    openAgain: [
      "I understand things get busy, so I wanted to follow up once more on {subject}.",
      "I am following up again on {subject} to ensure it stays on your radar.",
      "I am circling back another time on {subject}, and I appreciate your patience.",
      "I wanted to send a brief reminder regarding {subject}.",
    ],
    ask: [
      "Whenever you have a moment, could you please send over {notes}?",
      "When it is convenient, I would appreciate it if you could share {notes}.",
      "Could you please forward {notes} when you get a chance?",
      "If you are able to pass along {notes}, that would be a great help.",
    ],
    close: [
      "Please let me know if you need anything from me in the meantime.",
      "I am happy to answer any questions that come up on your end.",
      "Thank you very much for your help with this; it is much appreciated.",
      "Please let me know if there is anything I can clarify.",
    ],
  },
  concise: {
    greet: ["Hi {name},", "Hello {name},", "Dear {name},"],
    openFirst: [
      "I am following up on {subject}.",
      "A brief follow-up regarding {subject}.",
      "I am checking in on {subject}.",
    ],
    openAgain: [
      "I am following up again on {subject}.",
      "A further follow-up regarding {subject}.",
      "{subject} remains outstanding on my end.",
    ],
    ask: [
      "Could you please send over {notes} when you have a chance?",
      "Would you be able to share {notes}?",
      "Please forward {notes} at your convenience.",
    ],
    close: [
      "Thank you for your help.",
      "Thank you in advance.",
      "I appreciate your assistance.",
    ],
  },
};

const SAMPLE_RECIPIENT = { id: "preview", name: "Jordan", subject: "the onboarding paperwork", notes: "the signed contract", followUpsSent: 0 };

const PENDING_CATS = {
  requisition: { label: "Requisition", color: "#5f6f54" },
  changeorder: { label: "Change Order", color: "#a8442a" },
};
const SORT_FIELDS = [
  { id: "dateSent", label: "Date sent" },
  { id: "jobNumber", label: "Job number" },
  { id: "jobName", label: "Job name" },
  { id: "title", label: "Document title" },
  { id: "sentTo", label: "Sent to" },
];

function hashStr(s) { let h = 0; for (let i = 0; i < s.length; i++) { h = (h * 31 + s.charCodeAt(i)) >>> 0; } return h; }
function pick(arr, seed) { return arr[seed % arr.length]; }

const pad2 = (n) => String(n).padStart(2, "0");
function icsLocal(d) {
  return d.getFullYear() + pad2(d.getMonth() + 1) + pad2(d.getDate()) + "T" + pad2(d.getHours()) + pad2(d.getMinutes()) + "00";
}
function icsStamp() {
  const d = new Date();
  return d.getUTCFullYear() + pad2(d.getUTCMonth() + 1) + pad2(d.getUTCDate()) + "T" + pad2(d.getUTCHours()) + pad2(d.getUTCMinutes()) + pad2(d.getUTCSeconds()) + "Z";
}
function icsEscape(s) {
  return String(s || "").replace(/\\/g, "\\\\").replace(/;/g, "\\;").replace(/,/g, "\\,").replace(/\r?\n/g, "\\n");
}

const STORE_KEY = "followup-desk-v1";

const STATUS_META = {
  overdue: { label: "Overdue", color: "#9c3d28", Icon: AlertCircle },
  today: { label: "Due today", color: "#b5791f", Icon: CalendarClock },
  waiting: { label: "Waiting", color: "#5f6f54", Icon: Clock },
  done: { label: "Done", color: "#8a8073", Icon: Check },
};

function getStatus(f) {
  if (f.status === "done") return { key: "done" };
  const due = addDays(f.lastContact, Number(f.intervalDays) || 0);
  const diff = daysBetween(todayStr(), due);
  if (diff > 0) return { key: "waiting", days: diff, due };
  if (diff === 0) return { key: "today", due };
  return { key: "overdue", days: -diff, due };
}

const sortWeight = { overdue: 0, today: 1, waiting: 2, done: 3 };

function Stat({ n, label, tone }) {
  return (
    <div className="fd-stat">
      <span className="fd-stat-n" style={{ color: tone }}>{n}</span>
      <span className="fd-stat-l">{label}</span>
    </div>
  );
}

function ContactField({ value, onChange, contacts, placeholder, mode, onPick }) {
  const [open, setOpen] = useState(false);
  const rawParts = (value || "").split(",");
  const lastPartial = rawParts[rawParts.length - 1].trim();
  const committed = mode === "multi" ? rawParts.slice(0, -1).map((s) => s.trim()).filter(Boolean) : [];
  const q = (mode === "multi" ? lastPartial : (value || "").trim()).toLowerCase();
  const used = new Set(committed.map((s) => s.toLowerCase()));
  const matches = (contacts || []).filter((c) =>
    !used.has(c.email.toLowerCase()) &&
    (q === "" || (c.email + " " + (c.name || "") + " " + (c.company || "")).toLowerCase().includes(q))
  ).slice(0, 6);

  const choose = (c) => {
    if (mode === "multi") {
      onChange(committed.concat(c.email).join(", ") + ", ");
      setOpen(true);
    } else {
      if (onPick) onPick(c); else onChange(c.email);
      setOpen(false);
    }
  };

  return (
    <div className="fd-combo">
      <input
        className="fd-input"
        value={value}
        placeholder={placeholder}
        autoComplete="off"
        onChange={(e) => { onChange(e.target.value); setOpen(true); }}
        onFocus={() => setOpen(true)}
        onBlur={() => setTimeout(() => setOpen(false), 120)}
      />
      {open && matches.length > 0 && (
        <div className="fd-suggest">
          {matches.map((c) => (
            <button type="button" key={c.email} className="fd-suggest-item"
              onMouseDown={(e) => { e.preventDefault(); choose(c); }}>
              <span className="fd-suggest-email">{c.email}</span>
              {(c.name || c.company) && <span className="fd-suggest-name">{[c.name, c.company].filter(Boolean).join(" · ")}</span>}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

function FollowUpDesk() {
  const [followups, setFollowups] = useState([]);
  const [settings, setSettings] = useState(DEFAULT_SETTINGS);
  const [loaded, setLoaded] = useState(false);
  const [view, setView] = useState("attention");
  const [showForm, setShowForm] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [showSettings, setShowSettings] = useState(false);
  const [previewSeed, setPreviewSeed] = useState(1);
  const [toast, setToast] = useState(null);
  const [section, setSection] = useState("followups");
  const [pending, setPending] = useState([]);
  const [pendingView, setPendingView] = useState("all");
  const [pendingSort, setPendingSort] = useState({ field: "dateSent", dir: "desc" });
  const [showPendingForm, setShowPendingForm] = useState(false);
  const [editingPendingId, setEditingPendingId] = useState(null);

  const blankForm = () => ({
    name: "", company: "", email: "", cc: "", subject: "", notes: "",
    customBody: "", attachments: "",
    lastContact: todayStr(), intervalDays: settings.defaultInterval,
  });
  const [form, setForm] = useState(blankForm());

  const blankPForm = () => ({
    title: "", dateSent: todayStr(), category: "requisition",
    jobNumber: "", jobName: "", attachment: "", sentTo: "", sentToEmail: "",
  });
  const [pForm, setPForm] = useState(blankPForm());

  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORE_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        setFollowups(parsed.followups || []);
        setSettings({ ...DEFAULT_SETTINGS, ...(parsed.settings || {}) });
        setPending(parsed.pending || []);
      }
    } catch (e) { /* first run */ }
    setLoaded(true);
  }, []);

  useEffect(() => {
    if (!loaded) return;
    try { localStorage.setItem(STORE_KEY, JSON.stringify({ followups, settings, pending })); }
    catch (e) { console.error("save failed", e); }
  }, [followups, settings, pending, loaded]);

  const flash = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2200); };

  const fillTokens = (str, f) =>
    str
      .split("{name}").join(f.name || "there")
      .split("{subject}").join(f.subject || "our previous correspondence")
      .split("{notes}").join(f.notes || "the requested documents")
      .split("{signature}").join(settings.signature || "");

  const buildBody = (f, seedOverride) => {
    if (f.customBody && f.customBody.trim()) return fillTokens(f.customBody, f);
    if (settings.mode === "fixed") return fillTokens(settings.template, f);
    const pool = VARIANTS[settings.tone] || VARIANTS.warm;
    const base = (seedOverride != null ? seedOverride : hashStr(f.id) + (f.followUpsSent || 0)) >>> 0;
    const isFirst = (f.followUpsSent || 0) === 0;
    const greet = pick(pool.greet, base);
    const open = pick(isFirst ? pool.openFirst : pool.openAgain, base + 1);
    const ask = pick(pool.ask, base + 2);
    const close = pick(pool.close, base + 3);
    const body = [greet, open + " " + ask, close, settings.signature || ""].join("\n\n");
    return fillTokens(body, f);
  };

  const openInEmail = (f) => {
    const params = [];
    if (f.cc && f.cc.trim()) params.push("cc=" + encodeURIComponent(f.cc.trim()));
    params.push("subject=" + encodeURIComponent(f.subject || "Following up"));
    params.push("body=" + encodeURIComponent(buildBody(f)));
    const link = "mailto:" + encodeURIComponent(f.email) + "?" + params.join("&");
    try { window.open(link, "_blank"); } catch (e) { window.location.href = link; }
  };

  const copyText = async (f) => {
    const lines = ["To: " + f.email];
    if (f.cc && f.cc.trim()) lines.push("Cc: " + f.cc.trim());
    lines.push("Subject: " + (f.subject || "Following up"));
    const text = lines.join("\n") + "\n\n" + buildBody(f);
    try { await navigator.clipboard.writeText(text); flash("Email text copied to clipboard"); }
    catch (e) { flash("Couldn't copy — select the preview manually"); }
  };

  const reminderDateFor = (f) => {
    const due = addDays(f.lastContact, Number(f.intervalDays) || 0);
    return daysBetween(todayStr(), due) > 0 ? due : addDays(todayStr(), 1);
  };

  const eventLines = (f) => {
    const remindStr = reminderDateFor(f);
    const start = new Date(remindStr + "T09:00:00");
    const end = new Date(start.getTime() + 30 * 60000);
    const who = f.name || f.email;
    const summary = "Follow up: " + who + (f.company ? " (" + f.company + ")" : "") + (f.subject ? " — " + f.subject : "");
    return { remindStr, start, end, who, summary };
  };

  const triggerDownload = (filename, text) => {
    const blob = new Blob([text], { type: "text/calendar;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  };

  const slug = (f) => (f.name || f.email).replace(/[^a-z0-9]+/gi, "-").toLowerCase();

  const buildIcs = (f) => {
    const { start, end, who, summary } = eventLines(f);
    const desc = [];
    if (f.subject) desc.push("Subject: " + f.subject);
    if (f.notes) desc.push("Awaiting: " + f.notes);
    desc.push("To: " + f.email);
    if (f.cc && f.cc.trim()) desc.push("Cc: " + f.cc.trim());
    if (f.attachments && f.attachments.trim()) desc.push("Attach: " + f.attachments.trim());
    desc.push("(Reminder created by The Follow-Up Desk.)");
    return [
      "BEGIN:VCALENDAR",
      "VERSION:2.0",
      "PRODID:-//The Follow-Up Desk//EN",
      "CALSCALE:GREGORIAN",
      "METHOD:PUBLISH",
      "BEGIN:VEVENT",
      "UID:" + f.id + "@followup-desk",
      "SEQUENCE:" + (Number(f.followUpsSent) || 0),
      "DTSTAMP:" + icsStamp(),
      "DTSTART:" + icsLocal(start),
      "DTEND:" + icsLocal(end),
      "SUMMARY:" + icsEscape(summary),
      "DESCRIPTION:" + icsEscape(desc.join("\n")),
      "BEGIN:VALARM",
      "ACTION:DISPLAY",
      "DESCRIPTION:" + icsEscape("Follow-up reminder: " + who),
      "TRIGGER:-PT0M",
      "END:VALARM",
      "END:VEVENT",
      "END:VCALENDAR",
    ].join("\r\n");
  };

  const buildIcsCancel = (f) => {
    const { start, end, who, summary } = eventLines(f);
    return [
      "BEGIN:VCALENDAR",
      "VERSION:2.0",
      "PRODID:-//The Follow-Up Desk//EN",
      "CALSCALE:GREGORIAN",
      "METHOD:CANCEL",
      "BEGIN:VEVENT",
      "UID:" + f.id + "@followup-desk",
      "SEQUENCE:" + ((Number(f.followUpsSent) || 0) + 1),
      "DTSTAMP:" + icsStamp(),
      "DTSTART:" + icsLocal(start),
      "DTEND:" + icsLocal(end),
      "SUMMARY:" + icsEscape(summary),
      "STATUS:CANCELLED",
      "END:VEVENT",
      "END:VCALENDAR",
    ].join("\r\n");
  };

  const downloadIcs = (f, silent) => {
    try {
      triggerDownload("follow-up-" + slug(f) + ".ics", buildIcs(f));
      if (!silent) flash("Reminder set for " + prettyDate(reminderDateFor(f)) + " — open the file to add it to Outlook");
      return true;
    } catch (e) {
      if (!silent) flash("Couldn't create the reminder file");
      return false;
    }
  };

  const cancelReminder = (f) => {
    try {
      triggerDownload("follow-up-" + slug(f) + "-cancel.ics", buildIcsCancel(f));
      return true;
    } catch (e) {
      return false;
    }
  };

  const remindOnly = (f) => {
    if (downloadIcs(f)) setFollowups((arr) => arr.map((x) => (x.id === f.id ? { ...x, reminded: true } : x)));
  };

  const logFollowUp = (f) => {
    const updated = { ...f, lastContact: todayStr(), followUpsSent: (f.followUpsSent || 0) + 1, reminded: true };
    downloadIcs(updated, true);   // refresh the reminder to the new due date (no toast)
    openInEmail(f);               // compose the email using the current wording
    setFollowups((arr) => arr.map((x) => (x.id === f.id ? updated : x)));
    flash(f.attachments && f.attachments.trim()
      ? "Sent & logged — remember to attach: " + f.attachments.trim()
      : "Sent & logged — reminder updated to " + prettyDate(reminderDateFor(updated)));
  };

  const markDone = (f) => {
    const hadReminder = !!f.reminded;
    if (hadReminder) cancelReminder(f);
    setFollowups((arr) => arr.map((x) => (x.id === f.id ? { ...x, status: "done", reminded: false } : x)));
    flash(hadReminder ? "Marked done — open the cancellation file to clear the Outlook reminder" : "Marked done");
  };
  const reactivate = (id) => setFollowups((arr) => arr.map((x) => (x.id === id ? { ...x, status: "active", lastContact: todayStr() } : x)));
  const remove = (id) => setFollowups((arr) => arr.filter((x) => x.id !== id));

  const startEdit = (f) => {
    setForm({ name: f.name, company: f.company || "", email: f.email, cc: f.cc || "", subject: f.subject, notes: f.notes, customBody: f.customBody || "", attachments: f.attachments || "", lastContact: f.lastContact, intervalDays: f.intervalDays });
    setEditingId(f.id); setShowForm(true);
  };

  const submit = () => {
    if (!form.email.trim()) return flash("An email address is required");
    if (editingId) {
      setFollowups((arr) => arr.map((x) => (x.id === editingId ? { ...x, ...form } : x)));
      flash("Updated");
    } else {
      setFollowups((arr) => [...arr, { ...form, id: Date.now().toString(36), status: "active", followUpsSent: 0, createdAt: todayStr() }]);
      flash("Added to your follow-up list");
    }
    setForm(blankForm()); setEditingId(null); setShowForm(false);
  };

  const resetAll = () => {
    if (!window.confirm("Delete every tracked follow-up? This can't be undone.")) return;
    setFollowups([]); flash("Cleared");
  };

  const startEditPending = (p) => {
    setPForm({
      title: p.title || "", dateSent: p.dateSent || todayStr(), category: p.category || "requisition",
      jobNumber: p.jobNumber || "", jobName: p.jobName || "", attachment: p.attachment || "",
      sentTo: p.sentTo || "", sentToEmail: p.sentToEmail || "",
    });
    setEditingPendingId(p.id); setShowPendingForm(true);
  };

  const submitPending = () => {
    if (!pForm.title.trim()) return flash("A document title is required");
    if (editingPendingId) {
      setPending((arr) => arr.map((x) => (x.id === editingPendingId ? { ...x, ...pForm } : x)));
      flash("Updated");
    } else {
      setPending((arr) => [...arr, { ...pForm, id: Date.now().toString(36), createdAt: todayStr() }]);
      flash("Added to pending signatures");
    }
    setPForm(blankPForm()); setEditingPendingId(null); setShowPendingForm(false);
  };

  const removePending = (id) => setPending((arr) => arr.filter((x) => x.id !== id));
  const markSigned = (p) => { removePending(p.id); flash("Marked as signed and removed from pending"); };

  const createFollowUpFromPending = (p) => {
    const job = [p.jobNumber, p.jobName].filter(Boolean).join(" – ");
    const fu = {
      id: Date.now().toString(36),
      name: p.sentTo || "", company: job, email: p.sentToEmail || "", cc: "",
      subject: p.title || "", notes: p.title ? ("the signed " + p.title) : "the signed document",
      customBody: "", attachments: p.attachment || "",
      lastContact: p.dateSent || todayStr(), intervalDays: settings.defaultInterval,
      status: "active", followUpsSent: 0, createdAt: todayStr(),
    };
    setFollowups((arr) => [...arr, fu]);
    flash("Added to Follow-ups: " + (p.sentTo || p.sentToEmail || "new follow-up"));
  };

  const sortPending = (items) => {
    const f = pendingSort.field, dir = pendingSort.dir === "asc" ? 1 : -1;
    return [...items].sort((a, b) => {
      if (f === "jobNumber") {
        const an = parseFloat(a.jobNumber), bn = parseFloat(b.jobNumber);
        if (!isNaN(an) && !isNaN(bn)) return (an - bn) * dir;
      }
      return String(a[f] || "").localeCompare(String(b[f] || "")) * dir;
    });
  };

  const enriched = useMemo(() =>
    followups.map((f) => ({ ...f, _s: getStatus(f) })).sort((a, b) => {
      const w = sortWeight[a._s.key] - sortWeight[b._s.key];
      if (w !== 0) return w;
      if (a._s.due && b._s.due) return parseDate(a._s.due) - parseDate(b._s.due);
      return 0;
    }), [followups]);

  const counts = useMemo(() => {
    let attention = 0, waiting = 0, done = 0;
    enriched.forEach((f) => {
      if (f._s.key === "overdue" || f._s.key === "today") attention++;
      else if (f._s.key === "waiting") waiting++;
      else if (f._s.key === "done") done++;
    });
    return { attention, waiting, done };
  }, [enriched]);

  const filtered = enriched.filter((f) => {
    if (view === "all") return true;
    if (view === "attention") return f._s.key === "overdue" || f._s.key === "today";
    if (view === "waiting") return f._s.key === "waiting";
    if (view === "done") return f._s.key === "done";
    return true;
  });

  const contacts = useMemo(() => {
    const map = new Map();
    const add = (email, name, company) => {
      const e = (email || "").trim();
      if (!e) return;
      const key = e.toLowerCase();
      const existing = map.get(key);
      if (!existing) map.set(key, { email: e, name: name || "", company: company || "" });
      else {
        if (!existing.name && name) existing.name = name;
        if (!existing.company && company) existing.company = company;
      }
    };
    followups.forEach((f) => {
      add(f.email, f.name, f.company);
      (f.cc || "").split(",").forEach((c) => add(c.trim(), "", ""));
    });
    pending.forEach((p) => add(p.sentToEmail, p.sentTo, ""));
    return Array.from(map.values()).sort((a, b) => (a.name || a.email).localeCompare(b.name || b.email));
  }, [followups, pending]);

  const pendingCounts = useMemo(() => {
    let req = 0, co = 0;
    pending.forEach((p) => { if (p.category === "changeorder") co++; else req++; });
    return { req, co, total: pending.length };
  }, [pending]);

  const reqItems = sortPending(pending.filter((p) => p.category !== "changeorder"));
  const coItems = sortPending(pending.filter((p) => p.category === "changeorder"));

  const renderPending = (p) => {
    const cat = PENDING_CATS[p.category] || PENDING_CATS.requisition;
    return (
      <article className="fd-card" key={p.id}>
        <div className="fd-card-bar" style={{ background: cat.color }} />
        <div className="fd-card-body">
          <div className="fd-card-top">
            <div className="fd-who">
              <span className="fd-name">{p.title}</span>
              {(p.jobNumber || p.jobName) && <span className="fd-company">{[p.jobNumber, p.jobName].filter(Boolean).join(" · ")}</span>}
            </div>
            <span className="fd-badge" style={{ color: cat.color, borderColor: cat.color }}>{cat.label}</span>
          </div>
          <div className="fd-notes">Sent to {p.sentTo || "—"}{p.sentToEmail ? " · " + p.sentToEmail : ""}</div>
          {p.attachment && p.attachment.trim() && <div className="fd-notes">Attachment: {p.attachment}</div>}
          <div className="fd-meta"><span>Sent {p.dateSent ? prettyDate(p.dateSent) : "—"}</span></div>
          <div className="fd-actions">
            <button className="fd-btn primary sm" onClick={() => createFollowUpFromPending(p)}><Send size={14} /> Create follow-up</button>
            <button className="fd-btn ghost sm" onClick={() => markSigned(p)}><Check size={14} /> Mark signed</button>
            <div className="fd-spacer" />
            <button className="fd-icon-btn sm" title="Edit" onClick={() => startEditPending(p)}><Pencil size={15} /></button>
            <button className="fd-icon-btn sm danger" title="Delete" onClick={() => removePending(p.id)}><Trash2 size={15} /></button>
          </div>
        </div>
      </article>
    );
  };

  const tabs = [
    { id: "attention", label: "Needs attention", n: counts.attention },
    { id: "waiting", label: "Waiting", n: counts.waiting },
    { id: "done", label: "Done", n: counts.done },
    { id: "all", label: "All", n: enriched.length },
  ];

  return (
    <div className="fd-root">
      <div className="fd-wrap">
        <header className="fd-head">
          <div>
            <div className="fd-kicker">{section === "pending" ? "DOCUMENT TRACKER" : "CORRESPONDENCE LEDGER"}</div>
            <h1 className="fd-title">{section === "pending" ? "Pending Signatures" : "The Follow-Up Desk"}</h1>
            <p className="fd-sub">
              {section === "pending"
                ? "Documents you've sent out that are still awaiting a signature."
                : "Track who still owes you documents. The desk tells you exactly who's due, writes the note, and opens it in your mail app in one click."}
            </p>
          </div>
          <div className="fd-head-actions">
            {section === "followups" && (
              <button className="fd-icon-btn" title="Settings" onClick={() => setShowSettings((s) => !s)}>
                <SettingsIcon size={18} />
              </button>
            )}
          </div>
        </header>

        <div className="fd-nav">
          <button className={"fd-nav-btn" + (section === "followups" ? " active" : "")} onClick={() => setSection("followups")}>
            <Mail size={15} /> Follow-ups
          </button>
          <button className={"fd-nav-btn" + (section === "pending" ? " active" : "")} onClick={() => setSection("pending")}>
            <FileText size={15} /> Pending signatures{pendingCounts.total > 0 ? " (" + pendingCounts.total + ")" : ""}
          </button>
        </div>

        {section === "followups" && (
        <>
        <div className="fd-stats">
          <Stat n={counts.attention} label="due for follow-up" tone="#9c3d28" />
          <Stat n={counts.waiting} label="awaiting reply" tone="#5f6f54" />
          <Stat n={counts.done} label="documents received" tone="#8a8073" />
        </div>

        {showSettings && (
          <section className="fd-panel">
            <div className="fd-panel-head">
              <span>Default message &amp; cadence</span>
              <button className="fd-icon-btn sm" onClick={() => setShowSettings(false)}><X size={16} /></button>
            </div>
            <label className="fd-label">Default days between follow-ups</label>
            <input className="fd-input short" type="number" min="1" value={settings.defaultInterval}
              onChange={(e) => setSettings((s) => ({ ...s, defaultInterval: Number(e.target.value) }))} />
            <label className="fd-label" style={{ marginTop: 14 }}>Email style</label>
            <div className="fd-seg">
              <button className={"fd-seg-btn" + (settings.mode === "varied" ? " active" : "")} onClick={() => setSettings((s) => ({ ...s, mode: "varied" }))}>Vary automatically</button>
              <button className={"fd-seg-btn" + (settings.mode === "fixed" ? " active" : "")} onClick={() => setSettings((s) => ({ ...s, mode: "fixed" }))}>Fixed template</button>
            </div>

            {settings.mode === "varied" ? (
              <>
                <label className="fd-label" style={{ marginTop: 14 }}>Register <span className="fd-hint">— all professional</span></label>
                <div className="fd-seg">
                  {TONE_ORDER.map((t) => (
                    <button key={t} className={"fd-seg-btn" + (settings.tone === t ? " active" : "")} onClick={() => setSettings((s) => ({ ...s, tone: t }))}>{TONE_LABELS[t]}</button>
                  ))}
                </div>
                <label className="fd-label" style={{ marginTop: 14 }}>Preview <span className="fd-hint">— a different wording each time</span></label>
                <div className="fd-preview">{buildBody(SAMPLE_RECIPIENT, previewSeed)}</div>
                <button className="fd-btn ghost sm" style={{ marginTop: 10 }} onClick={() => setPreviewSeed(previewSeed + 1)}><RotateCcw size={14} /> Show another</button>
              </>
            ) : (
              <>
                <label className="fd-label" style={{ marginTop: 14 }}>Message template <span className="fd-hint">— use {"{name}"}, {"{subject}"}, {"{notes}"}, {"{signature}"}</span></label>
                <textarea className="fd-input area" rows={6} value={settings.template}
                  onChange={(e) => setSettings((s) => ({ ...s, template: e.target.value }))} />
              </>
            )}
            <label className="fd-label">Signature</label>
            <textarea className="fd-input area" rows={2} value={settings.signature}
              onChange={(e) => setSettings((s) => ({ ...s, signature: e.target.value }))} />
            <div className="fd-panel-foot">
              <button className="fd-link-danger" onClick={resetAll}><RotateCcw size={14} /> Clear all data</button>
            </div>
          </section>
        )}

        <div className="fd-toolbar">
          <div className="fd-tabs">
            {tabs.map((t) => (
              <button key={t.id} className={"fd-tab" + (view === t.id ? " active" : "")} onClick={() => setView(t.id)}>
                {t.label}<span className="fd-tab-n">{t.n}</span>
              </button>
            ))}
          </div>
          <button className="fd-btn primary"
            onClick={() => { setForm(blankForm()); setEditingId(null); setShowForm((s) => !s); setShowSettings(false); }}>
            <Plus size={16} /> New follow-up
          </button>
        </div>

        {showForm && (
          <section className="fd-panel">
            <div className="fd-panel-head">
              <span>{editingId ? "Edit follow-up" : "Add a follow-up"}</span>
              <button className="fd-icon-btn sm" onClick={() => { setShowForm(false); setEditingId(null); }}><X size={16} /></button>
            </div>
            <div className="fd-grid">
              <div>
                <label className="fd-label">Recipient name</label>
                <input className="fd-input" value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} placeholder="Jordan Smith" />
              </div>
              <div>
                <label className="fd-label">Company <span className="fd-hint">— for your records only</span></label>
                <input className="fd-input" value={form.company} onChange={(e) => setForm({ ...form, company: e.target.value })} placeholder="Acme Corp" />
              </div>
              <div>
                <label className="fd-label">Email address *</label>
                <ContactField mode="single" value={form.email} contacts={contacts}
                  placeholder="jordan@company.com"
                  onChange={(v) => setForm((fm) => ({ ...fm, email: v }))}
                  onPick={(c) => setForm((fm) => ({ ...fm, email: c.email, name: fm.name || c.name || "", company: fm.company || c.company || "" }))} />
              </div>
              <div>
                <label className="fd-label">CC <span className="fd-hint">— optional, comma-separated</span></label>
                <ContactField mode="multi" value={form.cc} contacts={contacts}
                  placeholder="manager@company.com"
                  onChange={(v) => setForm((fm) => ({ ...fm, cc: v }))} />
              </div>
              <div>
                <label className="fd-label">Subject / context</label>
                <input className="fd-input" value={form.subject} onChange={(e) => setForm({ ...form, subject: e.target.value })} placeholder="Q2 onboarding paperwork" />
              </div>
              <div>
                <label className="fd-label">What you're waiting on</label>
                <input className="fd-input" value={form.notes} onChange={(e) => setForm({ ...form, notes: e.target.value })} placeholder="signed contract + ID copy" />
              </div>
              <div>
                <label className="fd-label">Date you last contacted them</label>
                <input className="fd-input" type="date" value={form.lastContact} onChange={(e) => setForm({ ...form, lastContact: e.target.value })} />
              </div>
              <div>
                <label className="fd-label">Remind me every (days)</label>
                <input className="fd-input" type="number" min="1" value={form.intervalDays} onChange={(e) => setForm({ ...form, intervalDays: Number(e.target.value) })} />
              </div>
            </div>
            <label className="fd-label" style={{ marginTop: 14 }}>Custom message <span className="fd-hint">— optional; replaces the auto-written email for this person. Tokens {"{name}"}, {"{subject}"}, {"{notes}"}, {"{signature}"} work here too.</span></label>
            <textarea className="fd-input area" rows={5} value={form.customBody}
              placeholder="Leave blank to use the automatic professional follow-up."
              onChange={(e) => setForm({ ...form, customBody: e.target.value })} />
            <label className="fd-label">Attachments <span className="fd-hint">— optional, comma-separated file names; the app reminds you to attach them</span></label>
            <input className="fd-input" value={form.attachments}
              placeholder="contract.pdf, W-9.pdf"
              onChange={(e) => setForm({ ...form, attachments: e.target.value })} />
            <div className="fd-form-foot">
              <button className="fd-btn ghost" onClick={() => { setShowForm(false); setEditingId(null); }}>Cancel</button>
              <button className="fd-btn primary" onClick={submit}>{editingId ? "Save changes" : "Add"}</button>
            </div>
          </section>
        )}

        <div className="fd-list">
          {!loaded && <div className="fd-empty">Loading your desk…</div>}

          {loaded && filtered.length === 0 && (
            <div className="fd-empty">
              <Inbox size={28} />
              <p>{view === "done" ? "Nothing finished yet." : "Nothing here. Add someone you're chasing for documents."}</p>
            </div>
          )}

          {loaded && filtered.map((f) => {
            const meta = STATUS_META[f._s.key];
            const Ic = meta.Icon;
            return (
              <article className="fd-card" key={f.id}>
                <div className="fd-card-bar" style={{ background: meta.color }} />
                <div className="fd-card-body">
                  <div className="fd-card-top">
                    <div className="fd-who">
                      <span className="fd-name">{f.name || f.email}</span>
                      {f.company && <span className="fd-company">{f.company}</span>}
                      {f.name && <span className="fd-email">{f.email}</span>}
                      {f.cc && <span className="fd-email">Cc: {f.cc}</span>}
                    </div>
                    <span className="fd-badge" style={{ color: meta.color, borderColor: meta.color }}>
                      <Ic size={13} />
                      {meta.label}
                      {f._s.key === "overdue" && (" · " + f._s.days + "d")}
                      {f._s.key === "waiting" && (" · " + f._s.days + "d left")}
                    </span>
                  </div>

                  {f.subject && <div className="fd-subject">{f.subject}</div>}
                  {f.notes && <div className="fd-notes">Awaiting: {f.notes}</div>}
                  {f.attachments && f.attachments.trim() && <div className="fd-notes">Attachments: {f.attachments}</div>}
                  {f.customBody && f.customBody.trim() && <div className="fd-notes" style={{ fontStyle: "italic" }}>Custom message set for this follow-up</div>}

                  <div className="fd-meta">
                    <span>Last contact {prettyDate(f.lastContact)}</span>
                    <span className="fd-dot">·</span>
                    <span>Every {f.intervalDays}d</span>
                    {f.followUpsSent > 0 && (
                      <>
                        <span className="fd-dot">·</span>
                        <span>{f.followUpsSent} follow-up{f.followUpsSent > 1 ? "s" : ""} sent</span>
                      </>
                    )}
                  </div>

                  <div className="fd-actions">
                    {f.status !== "done" ? (
                      <>
                        <button className="fd-btn primary sm" onClick={() => logFollowUp(f)}><Send size={14} /> Send follow-up</button>
                        <button className="fd-btn ghost sm" onClick={() => copyText(f)}><Copy size={14} /> Copy text</button>
                        <button className="fd-btn ghost sm" onClick={() => remindOnly(f)}><CalendarClock size={14} /> Reminder only</button>
                        <button className="fd-btn ghost sm" onClick={() => markDone(f)}><Check size={14} /> Got documents</button>
                      </>
                    ) : (
                      <button className="fd-btn ghost sm" onClick={() => reactivate(f.id)}><RotateCcw size={14} /> Reopen</button>
                    )}
                    <div className="fd-spacer" />
                    <button className="fd-icon-btn sm" title="Edit" onClick={() => startEdit(f)}><Pencil size={15} /></button>
                    <button className="fd-icon-btn sm danger" title="Delete" onClick={() => remove(f.id)}><Trash2 size={15} /></button>
                  </div>
                </div>
              </article>
            );
          })}
        </div>
        </>
        )}

        {section === "pending" && (
        <>
          <div className="fd-stats">
            <Stat n={pendingCounts.req} label="requisitions pending" tone="#5f6f54" />
            <Stat n={pendingCounts.co} label="change orders pending" tone="#a8442a" />
            <Stat n={pendingCounts.total} label="documents total" tone="#8a8073" />
          </div>

          <div className="fd-toolbar">
            <div className="fd-tabs">
              {[
                { id: "all", label: "All", n: pendingCounts.total },
                { id: "requisition", label: "Requisitions", n: pendingCounts.req },
                { id: "changeorder", label: "Change Orders", n: pendingCounts.co },
              ].map((t) => (
                <button key={t.id} className={"fd-tab" + (pendingView === t.id ? " active" : "")} onClick={() => setPendingView(t.id)}>
                  {t.label}<span className="fd-tab-n">{t.n}</span>
                </button>
              ))}
            </div>
            <button className="fd-btn primary"
              onClick={() => { setPForm(blankPForm()); setEditingPendingId(null); setShowPendingForm((s) => !s); }}>
              <Plus size={16} /> New document
            </button>
          </div>

          <div className="fd-sortbar">
            <span className="fd-sort-label">Sort by</span>
            <select className="fd-select" value={pendingSort.field} onChange={(e) => setPendingSort((s) => ({ ...s, field: e.target.value }))}>
              {SORT_FIELDS.map((sf) => <option key={sf.id} value={sf.id}>{sf.label}</option>)}
            </select>
            <button className="fd-btn ghost sm" onClick={() => setPendingSort((s) => ({ ...s, dir: s.dir === "asc" ? "desc" : "asc" }))}>
              {pendingSort.dir === "asc" ? "Ascending ↑" : "Descending ↓"}
            </button>
          </div>

          {showPendingForm && (
            <section className="fd-panel">
              <div className="fd-panel-head">
                <span>{editingPendingId ? "Edit document" : "Add a pending document"}</span>
                <button className="fd-icon-btn sm" onClick={() => { setShowPendingForm(false); setEditingPendingId(null); }}><X size={16} /></button>
              </div>
              <div className="fd-grid">
                <div>
                  <label className="fd-label">Document title *</label>
                  <input className="fd-input" value={pForm.title} onChange={(e) => setPForm({ ...pForm, title: e.target.value })} placeholder="Change Order #14" />
                </div>
                <div>
                  <label className="fd-label">Category</label>
                  <div className="fd-seg">
                    <button className={"fd-seg-btn" + (pForm.category === "requisition" ? " active" : "")} onClick={() => setPForm({ ...pForm, category: "requisition" })}>Requisition</button>
                    <button className={"fd-seg-btn" + (pForm.category === "changeorder" ? " active" : "")} onClick={() => setPForm({ ...pForm, category: "changeorder" })}>Change Order</button>
                  </div>
                </div>
                <div>
                  <label className="fd-label">Date sent</label>
                  <input className="fd-input" type="date" value={pForm.dateSent} onChange={(e) => setPForm({ ...pForm, dateSent: e.target.value })} />
                </div>
                <div>
                  <label className="fd-label">Job number</label>
                  <input className="fd-input" value={pForm.jobNumber} onChange={(e) => setPForm({ ...pForm, jobNumber: e.target.value })} placeholder="1042" />
                </div>
                <div>
                  <label className="fd-label">Job name</label>
                  <input className="fd-input" value={pForm.jobName} onChange={(e) => setPForm({ ...pForm, jobName: e.target.value })} placeholder="Riverside Office Build" />
                </div>
                <div>
                  <label className="fd-label">Attachment <span className="fd-hint">— file name</span></label>
                  <input className="fd-input" value={pForm.attachment} onChange={(e) => setPForm({ ...pForm, attachment: e.target.value })} placeholder="CO-14.pdf" />
                </div>
                <div>
                  <label className="fd-label">Sent to</label>
                  <input className="fd-input" value={pForm.sentTo} onChange={(e) => setPForm({ ...pForm, sentTo: e.target.value })} placeholder="Jordan Smith" />
                </div>
                <div>
                  <label className="fd-label">Sent to email</label>
                  <ContactField mode="single" value={pForm.sentToEmail} contacts={contacts}
                    placeholder="jordan@company.com"
                    onChange={(v) => setPForm((pf) => ({ ...pf, sentToEmail: v }))}
                    onPick={(c) => setPForm((pf) => ({ ...pf, sentToEmail: c.email, sentTo: pf.sentTo || c.name || "" }))} />
                </div>
              </div>
              <div className="fd-form-foot">
                <button className="fd-btn ghost" onClick={() => { setShowPendingForm(false); setEditingPendingId(null); }}>Cancel</button>
                <button className="fd-btn primary" onClick={submitPending}>{editingPendingId ? "Save changes" : "Add"}</button>
              </div>
            </section>
          )}

          <div className="fd-list">
            {!loaded && <div className="fd-empty">Loading…</div>}
            {loaded && pendingCounts.total === 0 && (
              <div className="fd-empty">
                <FileText size={28} />
                <p>No pending documents. Add one you've sent out for signature.</p>
              </div>
            )}
            {loaded && (pendingView === "all" || pendingView === "requisition") && reqItems.length > 0 && (
              <>
                <div className="fd-group-head" style={{ color: PENDING_CATS.requisition.color }}>Requisitions</div>
                {reqItems.map((p) => renderPending(p))}
              </>
            )}
            {loaded && (pendingView === "all" || pendingView === "changeorder") && coItems.length > 0 && (
              <>
                <div className="fd-group-head" style={{ color: PENDING_CATS.changeorder.color }}>Change Orders</div>
                {coItems.map((p) => renderPending(p))}
              </>
            )}
          </div>
        </>
        )}

        <footer className="fd-foot">
          <Mail size={13} /> “Send follow-up” opens your default mail app (set Outlook as your default to
          compose there), pre-filled and ready to review before you hit send. Your list is saved in this
          browser.
        </footer>
      </div>

      {toast && <div className="fd-toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<FollowUpDesk />);
</script>
</body>
</html>
