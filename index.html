<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Follow-Up Desk</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap');

html,body{margin:0;padding:0;}
*{box-sizing:border-box;}

.fd-root{
  --paper:#eef1ec; --surface:#ffffff; --ink:#23271f; --muted:#6f7464;
  --line:#d8ddd2; --accent:#1f6cb0; --accent-d:#185a93;
  font-family:'IBM Plex Sans',sans-serif; color:var(--ink);
  background:var(--paper);
  background-image:radial-gradient(circle at 18% 12%, #e9eee6 0%, transparent 55%),
                   radial-gradient(circle at 88% 0%, #e6edf2 0%, transparent 45%);
  min-height:100vh; width:100%;
}
.fd-wrap{max-width:760px; margin:0 auto; padding:40px 22px 60px;}

.fd-head{display:flex; justify-content:space-between; align-items:flex-start; gap:16px; margin-bottom:26px;}
.fd-brand{display:flex; align-items:center; gap:14px; padding-bottom:18px; margin-bottom:24px; border-bottom:1px solid var(--line);}
.fd-logo{height:50px; width:auto; display:block;}
.fd-kicker{font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.22em; color:var(--accent); margin-bottom:8px;}
.fd-title{font-family:'Fraunces',serif; font-weight:600; font-size:42px; line-height:1; margin:0 0 12px; letter-spacing:-.01em;}
.fd-sub{margin:0; font-size:14.5px; line-height:1.55; color:var(--muted); max-width:54ch;}
.fd-head-actions{flex-shrink:0; display:flex; gap:8px;}
.fd-auth{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;}
.fd-auth-box{background:var(--surface); border:1px solid var(--line); border-radius:18px; padding:30px 28px; max-width:380px; width:100%; box-shadow:0 14px 40px rgba(0,0,0,.1);}
.fd-auth-err{margin-top:12px; font-size:13px; color:var(--accent); background:#e9f1f8; border:1px solid #cfe0f0; border-radius:9px; padding:9px 12px; line-height:1.45;}
.fd-auth-toggle{display:block; width:100%; text-align:center; margin-top:14px; background:none; border:none; font-family:inherit; font-size:13px; color:var(--muted); cursor:pointer;}
.fd-auth-toggle:hover{color:var(--ink); text-decoration:underline;}

.fd-stats{display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:24px;}
.fd-stat{background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:16px 18px; display:flex; flex-direction:column; gap:4px;}
.fd-stat-n{font-family:'Fraunces',serif; font-size:34px; font-weight:600; line-height:1;}
.fd-stat-l{font-size:12px; color:var(--muted); line-height:1.3;}

.fd-toolbar{display:flex; justify-content:space-between; align-items:center; gap:14px; margin-bottom:18px; flex-wrap:wrap;}
.fd-tabs{display:flex; gap:4px; background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:4px;}
.fd-tab{border:none; background:none; font-family:inherit; font-size:13px; color:var(--muted); padding:7px 12px; border-radius:8px; cursor:pointer; display:flex; align-items:center; gap:7px; transition:all .15s;}
.fd-tab:hover{color:var(--ink);}
.fd-tab.active{background:var(--ink); color:var(--paper);}
.fd-tab-n{font-family:'IBM Plex Mono',monospace; font-size:11px; opacity:.7;}
.fd-nav{display:flex; gap:4px; margin-bottom:22px; border-bottom:1px solid var(--line);}
.fd-nav-btn{display:inline-flex; align-items:center; gap:7px; background:none; border:none; border-bottom:2px solid transparent; font-family:inherit; font-size:14px; color:var(--muted); padding:10px 8px; margin-bottom:-1px; cursor:pointer; transition:all .15s;}
.fd-nav-btn:hover{color:var(--ink);}
.fd-nav-btn.active{color:var(--ink); border-bottom-color:var(--accent); font-weight:500;}
.fd-sortbar{display:flex; align-items:center; gap:10px; margin-bottom:16px; flex-wrap:wrap;}
.fd-sort-label{font-size:12.5px; color:var(--muted);}
.fd-select{font-family:inherit; font-size:13px; color:var(--ink); background:#f7f9f5; border:1px solid var(--line); border-radius:9px; padding:8px 10px; cursor:pointer;}
.fd-select:focus{outline:none; border-color:var(--accent);}
.fd-group-head{font-family:'Fraunces',serif; font-size:17px; font-weight:600; margin:8px 2px 0; padding-top:8px; letter-spacing:.01em;}
.fd-cal-head{display:flex; align-items:center; gap:10px; margin-bottom:14px;}
.fd-cal-title{font-family:'Fraunces',serif; font-size:20px; font-weight:600; min-width:170px;}
.fd-cal-legend{display:flex; gap:18px; margin-bottom:14px; font-size:12.5px; color:var(--muted);}
.fd-legend-item{display:inline-flex; align-items:center; gap:7px;}
.fd-dotmark{width:8px; height:8px; border-radius:999px; display:inline-block; flex-shrink:0;}
.fd-cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:5px;}
.fd-cal-wd{text-align:center; font-size:11px; font-family:'IBM Plex Mono',monospace; color:var(--muted); padding-bottom:4px; letter-spacing:.05em;}
.fd-cal-cell{min-height:62px; background:var(--surface); border:1px solid var(--line); border-radius:9px; padding:6px; cursor:pointer; display:flex; flex-direction:column; gap:4px; transition:all .12s;}
.fd-cal-cell:hover{border-color:#c2cabd;}
.fd-cal-cell.empty{background:transparent; border:none; cursor:default;}
.fd-cal-cell.today{border-color:var(--accent);}
.fd-cal-cell.sel{background:#edf2ee; border-color:var(--accent);}
.fd-cal-day{font-size:12.5px; font-weight:500; color:var(--ink);}
.fd-cal-cell.today .fd-cal-day{color:var(--accent); font-weight:700;}
.fd-cal-dots{display:flex; flex-wrap:wrap; gap:3px;}
.fd-cal-day-list{margin-top:18px;}
.fd-cal-event{display:flex; align-items:center; gap:10px; width:100%; text-align:left; background:var(--surface); border:1px solid var(--line); border-radius:10px; padding:11px 14px; margin-top:8px; font-family:inherit; cursor:pointer; transition:all .15s;}
.fd-cal-event:hover{background:#edf2ee; border-color:#c2cabd;}
.fd-cal-event-type{font-size:11px; font-family:'IBM Plex Mono',monospace; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; flex-shrink:0;}
.fd-cal-event-label{flex:1; font-size:14px; color:var(--ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
@media(max-width:560px){
  .fd-cal-cell{min-height:50px; padding:4px; border-radius:7px;}
  .fd-cal-title{font-size:17px; min-width:0; flex:1;}
  .fd-cal-grid{gap:3px;}
}

.fd-btn{font-family:inherit; font-size:13.5px; font-weight:500; border-radius:10px; padding:9px 15px; cursor:pointer; display:inline-flex; align-items:center; gap:7px; border:1px solid transparent; transition:all .15s;}
.fd-btn.sm{font-size:12.5px; padding:7px 11px; border-radius:9px;}
.fd-btn.primary{background:var(--accent); color:#ffffff; box-shadow:0 1px 0 var(--accent-d);}
.fd-btn.primary:hover{background:var(--accent-d);}
.fd-btn.ghost{background:transparent; color:var(--ink); border-color:var(--line);}
.fd-btn.ghost:hover{background:#edf2ee; border-color:#c2cabd;}

.fd-icon-btn{background:var(--surface); border:1px solid var(--line); border-radius:10px; width:38px; height:38px; display:inline-flex; align-items:center; justify-content:center; cursor:pointer; color:var(--ink); transition:all .15s;}
.fd-icon-btn.sm{width:32px; height:32px; border-radius:8px;}
.fd-icon-btn:hover{background:#edf2ee; border-color:#c2cabd;}
.fd-icon-btn.danger:hover{color:var(--accent); border-color:var(--accent);}

.fd-panel{background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:20px; margin-bottom:20px; animation:fdIn .2s ease;}
.fd-panel-head{display:flex; justify-content:space-between; align-items:center; font-family:'Fraunces',serif; font-size:18px; font-weight:600; margin-bottom:16px;}
.fd-panel-foot{margin-top:16px; padding-top:14px; border-top:1px solid var(--line);}
.fd-label{display:block; font-size:12px; color:var(--muted); margin:0 0 6px; font-weight:500;}
.fd-hint{color:#a59a82; font-weight:400;}
.fd-input{width:100%; font-family:inherit; font-size:14px; color:var(--ink); background:#f7f9f5; border:1px solid var(--line); border-radius:10px; padding:10px 12px; transition:border .15s;}
.fd-input:focus{outline:none; border-color:var(--accent);}
.fd-input.short{max-width:120px;}
.fd-input.area{font-family:inherit; line-height:1.5; resize:vertical; margin-bottom:14px;}
.fd-grid{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
.fd-combo{position:relative;}
.fd-suggest{position:absolute; top:100%; left:0; right:0; margin-top:4px; background:var(--surface); border:1px solid var(--line); border-radius:10px; box-shadow:0 10px 28px rgba(0,0,0,.14); z-index:30; max-height:212px; overflow-y:auto; padding:4px;}
.fd-suggest-item{display:flex; flex-direction:column; gap:1px; width:100%; text-align:left; background:none; border:none; border-bottom:1px solid var(--line); font-family:inherit; padding:9px 10px; border-radius:0; cursor:pointer;}
.fd-suggest-item:first-child{border-top-left-radius:7px; border-top-right-radius:7px;}
.fd-suggest-item:last-child{border-bottom:none; border-bottom-left-radius:7px; border-bottom-right-radius:7px;}
.fd-suggest-item:hover{background:#edf2ee;}
.fd-suggest-email{font-size:12.5px; font-family:'IBM Plex Mono',monospace; color:var(--ink);}
.fd-suggest-name{font-size:11.5px; color:var(--muted);}

.fd-drop{display:flex; align-items:center; justify-content:center; gap:8px; text-align:center; border:1.5px dashed var(--line); border-radius:12px; padding:18px 14px; font-size:13px; color:var(--muted); cursor:pointer; background:#f7f9f5; transition:all .15s;}
.fd-drop:hover{border-color:#c2cabd; color:var(--ink);}
.fd-drop.drag{border-color:var(--accent); color:var(--accent); background:#e9f1f8;}
.fd-file-list{display:flex; flex-direction:column; gap:6px; margin-top:10px;}
.fd-file-row{display:flex; align-items:center; gap:8px;}
.fd-file-main{flex:1; min-width:0; display:flex; align-items:center; gap:8px; text-align:left; background:var(--surface); border:1px solid var(--line); border-radius:9px; padding:8px 11px; font-family:inherit; font-size:13px; color:var(--ink); cursor:pointer; transition:all .15s;}
.fd-file-main:hover{background:#edf2ee; border-color:#c2cabd;}
.fd-file-name{flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.fd-file-size{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); flex-shrink:0;}
.fd-files{display:flex; flex-wrap:wrap; gap:6px; margin-top:8px;}
.fd-file-chip{display:inline-flex; align-items:center; gap:6px; max-width:100%; background:#f7f9f5; border:1px solid var(--line); border-radius:999px; padding:5px 11px; font-family:inherit; font-size:12px; color:var(--ink); cursor:pointer; transition:all .15s;}
.fd-file-chip:hover{background:#edf2ee; border-color:var(--accent); color:var(--accent);}

.fd-modal{position:fixed; inset:0; background:rgba(35,32,26,.55); display:flex; align-items:center; justify-content:center; padding:20px; z-index:60; animation:fdIn .15s ease;}
.fd-modal-box{background:var(--surface); border:1px solid var(--line); border-radius:16px; width:100%; max-width:760px; max-height:88vh; display:flex; flex-direction:column; overflow:hidden; box-shadow:0 20px 50px rgba(0,0,0,.3);}
.fd-modal-head{display:flex; align-items:center; justify-content:space-between; gap:12px; padding:14px 16px; border-bottom:1px solid var(--line); font-family:'Fraunces',serif; font-size:16px; font-weight:600;}
.fd-modal-body{flex:1; min-height:200px; overflow:auto; display:flex; align-items:center; justify-content:center; background:#e9eee6;}
.fd-modal-foot{padding:12px 16px; border-top:1px solid var(--line); display:flex; justify-content:flex-end;}
.fd-preview-img{max-width:100%; max-height:78vh; display:block;}
.fd-preview-frame{width:100%; height:74vh; border:none; background:#fff;}
.fd-seg{display:inline-flex; gap:4px; background:#edf2ee; border:1px solid var(--line); border-radius:10px; padding:4px; flex-wrap:wrap;}
.fd-seg-btn{border:none; background:none; font-family:inherit; font-size:12.5px; color:var(--muted); padding:7px 13px; border-radius:7px; cursor:pointer; transition:all .15s;}
.fd-seg-btn:hover{color:var(--ink);}
.fd-seg-btn.active{background:var(--surface); color:var(--ink); box-shadow:0 1px 2px rgba(0,0,0,.07);}
.fd-seg-btn.cap{text-transform:capitalize;}
.fd-preview{white-space:pre-wrap; font-size:13px; line-height:1.6; color:var(--ink); background:#f7f9f5; border:1px solid var(--line); border-radius:10px; padding:14px 16px;}
.fd-form-foot{display:flex; justify-content:flex-end; gap:10px; margin-top:18px;}

.fd-list{display:flex; flex-direction:column; gap:12px;}
.fd-card{display:flex; background:var(--surface); border:1px solid var(--line); border-radius:14px; overflow:hidden; animation:fdIn .25s ease;}
.fd-card-bar{width:5px; flex-shrink:0;}
.fd-card-body{padding:16px 18px; flex:1; min-width:0;}
.fd-card-top{display:flex; justify-content:space-between; align-items:flex-start; gap:12px;}
.fd-who{display:flex; flex-direction:column; min-width:0;}
.fd-name{font-family:'Fraunces',serif; font-size:18px; font-weight:600; line-height:1.2;}
.fd-email{font-size:12.5px; color:var(--muted); font-family:'IBM Plex Mono',monospace; margin-top:2px; word-break:break-all;}
.fd-company{font-size:12px; color:var(--accent); font-weight:600; margin-top:3px; letter-spacing:.02em;}
.fd-company-lead{font-family:'Fraunces',serif; font-size:19px; font-weight:700; color:var(--accent); line-height:1.2; letter-spacing:-.01em;}
.fd-name-sub{font-size:13.5px; font-weight:500; color:var(--ink); margin-top:3px;}
.fd-badge{flex-shrink:0; display:inline-flex; align-items:center; gap:5px; font-size:11.5px; font-weight:500; border:1px solid; border-radius:999px; padding:4px 10px; background:#f7f9f5; white-space:nowrap;}
.fd-subject{margin-top:10px; font-size:14px; font-weight:500;}
.fd-notes{margin-top:3px; font-size:13px; color:var(--muted);}
.fd-meta{margin-top:10px; font-size:12px; color:var(--muted); font-family:'IBM Plex Mono',monospace; display:flex; flex-wrap:wrap; gap:6px; align-items:center;}
.fd-dot{opacity:.5;}
.fd-actions{margin-top:14px; display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
.fd-spacer{flex:1;}

.fd-empty{text-align:center; color:var(--muted); padding:48px 20px; display:flex; flex-direction:column; align-items:center; gap:12px; font-size:14px;}

.fd-foot{margin-top:30px; padding-top:18px; border-top:1px solid var(--line); font-size:12px; color:var(--muted); display:flex; align-items:flex-start; gap:8px; line-height:1.5;}

.fd-link-danger{background:none; border:none; color:var(--accent); font-family:inherit; font-size:12.5px; cursor:pointer; display:inline-flex; align-items:center; gap:6px; padding:0;}
.fd-link-danger:hover{text-decoration:underline;}

.fd-toast{position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--ink); color:var(--paper); font-size:13px; padding:11px 18px; border-radius:10px; box-shadow:0 8px 24px rgba(0,0,0,.18); animation:fdIn .2s ease; z-index:50;}

@keyframes fdIn{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;}}

@media(max-width:560px){
  .fd-wrap{padding:28px 16px 48px;}
  .fd-stats{grid-template-columns:1fr;}
  .fd-grid{grid-template-columns:1fr;}
  .fd-title{font-size:32px;}
  .fd-toolbar{flex-direction:column; align-items:stretch;}
  .fd-tabs{overflow-x:auto;}
  .fd-btn{justify-content:center;}
}
</style>
</head>

const Inbox = (p) => <Svg {...p}><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></Svg>;

function hashStr(s) { let h = 0; for (let i = 0; i < s.length; i++) { h = (h * 31 + s.charCodeAt(i)) >>> 0; } return h; }
function pick(arr, seed) { return arr[seed % arr.length]; }

const pad2 = (n) => String(n).padStart(2, "0");
const ymd = (d) => d.getFullYear() + "-" + pad2(d.getMonth() + 1) + "-" + pad2(d.getDate());
function icsLocal(d) {
  return d.getFullYear() + pad2(d.getMonth() + 1) + pad2(d.getDate()) + "T" + pad2(d.getHours()) + pad2(d.getMinutes()) + "00";
}
function icsStamp() {
  const d = new Date();
  return d.getUTCFullYear() + pad2(d.getUTCMonth() + 1) + pad2(d.getUTCDate()) + "T" + pad2(d.getUTCHours()) + pad2(d.getUTCMinutes()) + pad2(d.getUTCSeconds()) + "Z";
}
function icsEscape(s) {
  return String(s || "").replace(/\\/g, "\\\\").replace(/;/g, "\\;").replace(/,/g, "\\,").replace(/\r?\n/g, "\\n");
}

// ---------- IndexedDB blob storage for attachments ----------
const DB_NAME = "followup-desk-files";
const DB_STORE = "files";
let _dbPromise = null;
function openDB() {
  if (_dbPromise) return _dbPromise;
  _dbPromise = new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = () => { req.result.createObjectStore(DB_STORE); };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
  return _dbPromise;
}
async function idbPut(key, blob) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(DB_STORE, "readwrite");
    tx.objectStore(DB_STORE).put(blob, key);
    tx.oncomplete = () => res(true);
    tx.onerror = () => rej(tx.error);
  });
}
async function idbGet(key) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(DB_STORE, "readonly");
    const r = tx.objectStore(DB_STORE).get(key);
    r.onsuccess = () => res(r.result || null);
    r.onerror = () => rej(r.error);
  });
}
function idbDelete(key) {
  return openDB().then((db) => new Promise((res) => {
    const tx = db.transaction(DB_STORE, "readwrite");
    tx.objectStore(DB_STORE).delete(key);
    tx.oncomplete = () => res(true);
    tx.onerror = () => res(false);
  }));
}

};

const STATUS_META = {
  overdue: { label: "Overdue", color: "#9c3d28", Icon: AlertCircle },
  today: { label: "Due today", color: "#b5791f", Icon: CalendarClock },
  waiting: { label: "Waiting", color: "#5f6f54", Icon: Clock },
  done: { label: "Done", color: "#8a8073", Icon: Check },
};

function getStatus(f) {
  if (f.status === "done") return { key: "done" };
  const due = addDays(f.lastContact, Number(f.intervalDays) || 0);
  const diff = daysBetween(todayStr(), due);
  if (diff > 0) return { key: "waiting", days: diff, due };
  if (diff === 0) return { key: "today", due };
  return { key: "overdue", days: -diff, due };
}

const sortWeight = { overdue: 0, today: 1, waiting: 2, done: 3 };

function Stat({ n, label, tone }) {
  return (
    <div className="fd-stat">
      <span className="fd-stat-n" style={{ color: tone }}>{n}</span>
      <span className="fd-stat-l">{label}</span>
    </div>
  );
}

function ContactField({ value, onChange, contacts, placeholder, mode, onPick }) {
  const [open, setOpen] = useState(false);
  const rawParts = (value || "").split(";");
  const lastPartial = rawParts[rawParts.length - 1].trim();
  const committed = mode === "multi" ? rawParts.slice(0, -1).map((s) => s.trim()).filter(Boolean) : [];
  const q = (mode === "multi" ? lastPartial : (value || "").trim()).toLowerCase();
  const used = new Set(committed.map((s) => s.toLowerCase()));
  const matches = (contacts || []).filter((c) =>
    !used.has(c.email.toLowerCase()) &&
    (q === "" || (c.email + " " + (c.name || "") + " " + (c.company || "")).toLowerCase().includes(q))
  ).slice(0, 6);

  const choose = (c) => {
    if (mode === "multi") {
      onChange(committed.concat(c.email).join("; ") + "; ");
      setOpen(true);
    } else {
      if (onPick) onPick(c); else onChange(c.email);
      setOpen(false);
    }
  };

  return (
    <div className="fd-combo">
      <input
        className="fd-input"
        value={value}
        placeholder={placeholder}
        autoComplete="off"
        onChange={(e) => { onChange(e.target.value); setOpen(true); }}
        onFocus={() => setOpen(true)}
        onBlur={() => setTimeout(() => setOpen(false), 120)}
      />
      {open && matches.length > 0 && (
        <div className="fd-suggest">
          {matches.map((c) => (
            <button type="button" key={c.email} className="fd-suggest-item"
              onMouseDown={(e) => { e.preventDefault(); choose(c); }}>
              <span className="fd-suggest-email">{c.email}</span>
              {(c.name || c.company) && <span className="fd-suggest-name">{[c.name, c.company].filter(Boolean).join(" · ")}</span>}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

function FileDrop({ files, onChange, onPreview }) {
  const [drag, setDrag] = useState(false);
  const inputRef = useRef(null);

  const addFiles = async (fileList) => {
    const added = [];
    for (const file of Array.from(fileList)) {
      const fileId = newFileId();
      try {
        await idbPut(fileId, file);
        added.push({ fileId, name: file.name, type: file.type, size: file.size });
      } catch (e) { /* skip */ }
    }
    if (added.length) onChange([...(files || []), ...added]);
  };

  const removeFile = (fileId) => {
    idbDelete(fileId);
    onChange((files || []).filter((f) => f.fileId !== fileId));
  };

  return (
    <div>
      <div
        className={"fd-drop" + (drag ? " drag" : "")}
        onClick={() => inputRef.current && inputRef.current.click()}
        onDragOver={(e) => { e.preventDefault(); setDrag(true); }}
        onDragLeave={() => setDrag(false)}
        onDrop={(e) => { e.preventDefault(); setDrag(false); addFiles(e.dataTransfer.files); }}
      >
        <Plus size={16} /> Drag &amp; drop files here, or click to choose
        <input ref={inputRef} type="file" multiple style={{ display: "none" }}
          onChange={(e) => { addFiles(e.target.files); e.target.value = ""; }} />
      </div>
      {files && files.length > 0 && (
        <div className="fd-file-list">
          {files.map((f) => (
            <div className="fd-file-row" key={f.fileId}>
              <button type="button" className="fd-file-main" onClick={() => onPreview && onPreview(f)} title="Preview">
                <FileText size={14} />
                <span className="fd-file-name">{f.name}</span>
                <span className="fd-file-size">{prettySize(f.size)}</span>
              </button>
              <button type="button" className="fd-icon-btn sm danger" title="Remove" onClick={() => removeFile(f.fileId)}><X size={14} /></button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function FilePreviewModal({ file, onClose }) {
  const [url, setUrl] = useState(null);
  const [missing, setMissing] = useState(false);
  useEffect(() => {
    let u;
    idbGet(file.fileId).then((blob) => {
      if (blob) { u = URL.createObjectURL(blob); setUrl(u); } else setMissing(true);
    }).catch(() => setMissing(true));
    return () => { if (u) URL.revokeObjectURL(u); };
  }, [file.fileId]);

  const isImg = (file.type || "").startsWith("image/");
  const isPdf = (file.type || "") === "application/pdf";
  const isText = (file.type || "").startsWith("text/");

  return (
    <div className="fd-modal" onClick={onClose}>
      <div className="fd-modal-box" onClick={(e) => e.stopPropagation()}>
        <div className="fd-modal-head">
          <span className="fd-file-name">{file.name}</span>
          <button className="fd-icon-btn sm" onClick={onClose}><X size={16} /></button>
        </div>
        <div className="fd-modal-body">
          {!url && !missing && <div className="fd-empty">Loading preview…</div>}
          {missing && <div className="fd-empty"><FileText size={28} /><p>This file is no longer stored in the browser.</p></div>}
          {url && isImg && <img src={url} alt={file.name} className="fd-preview-img" />}
          {url && (isPdf || isText) && <iframe src={url} className="fd-preview-frame" title={file.name} />}
          {url && !isImg && !isPdf && !isText && (
            <div className="fd-empty">
              <FileText size={28} />
              <p>No inline preview for this file type.</p>
            </div>
          )}
        </div>
        {url && (
          <div className="fd-modal-foot">
            <a className="fd-btn ghost sm" href={url} download={file.name}>Download</a>
          </div>
        )}
      </div>
    </div>
  );
}

function FollowUpDesk() {
  const [followups, setFollowups] = useState([]);
  const [settings, setSettings] = useState(DEFAULT_SETTINGS);
  const [loaded, setLoaded] = useState(false);
  const [view, setView] = useState("attention");
  const [showForm, setShowForm] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [showSettings, setShowSettings] = useState(false);
  const [previewSeed, setPreviewSeed] = useState(1);
  const [toast, setToast] = useState(null);
  const [section, setSection] = useState("calendar");
  const [pending, setPending] = useState([]);
  const [pendingView, setPendingView] = useState("all");
  const [pendingSort, setPendingSort] = useState({ field: "dateSent", dir: "desc" });
  const [showPendingForm, setShowPendingForm] = useState(false);
  const [editingPendingId, setEditingPendingId] = useState(null);
  const [previewFile, setPreviewFile] = useState(null);
  const [deadlines, setDeadlines] = useState([]);
  const [showDeadlineForm, setShowDeadlineForm] = useState(false);
  const [editingDeadlineId, setEditingDeadlineId] = useState(null);
  const [calMonth, setCalMonth] = useState(() => { const n = new Date(); return new Date(n.getFullYear(), n.getMonth(), 1); });
  const [calSelected, setCalSelected] = useState(null);
  const [authReady, setAuthReady] = useState(!cloudOn);
  const [username, setUsername] = useState(() => { try { return localStorage.getItem(USER_KEY) || ""; } catch (e) { return ""; } });
  const [usernameInput, setUsernameInput] = useState("");
  const lastSyncedRef = useRef("");
  const cloudLoadedRef = useRef(false);

  const blankForm = () => ({
    name: "", company: "", email: "", cc: "", subject: "", notes: "",
    customBody: "", attachments: "", files: [],
    lastContact: todayStr(), intervalDays: settings.defaultInterval,
  });
  const [form, setForm] = useState(blankForm());

  const blankPForm = () => ({
    title: "", dateSent: todayStr(), category: "requisition",
    jobNumber: "", jobName: "", attachment: "", sentTo: "", sentToEmail: "", files: [],
  });
  const [pForm, setPForm] = useState(blankPForm());

  const blankDForm = () => ({ title: "", dueDate: todayStr(), leadDays: 3, notes: "" });
  const [dForm, setDForm] = useState(blankDForm());

  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORE_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        setFollowups(parsed.followups || []);
        setSettings({ ...DEFAULT_SETTINGS, ...(parsed.settings || {}) });
        setPending(parsed.pending || []);
        setDeadlines(parsed.deadlines || []);
      }
    } catch (e) { /* first run */ }
    setLoaded(true);
  }, []);

  useEffect(() => {
    if (!loaded) return;
    const json = JSON.stringify({ followups, settings, pending, deadlines });
    try { localStorage.setItem(STORE_KEY, json); }
    catch (e) { console.error("save failed", e); }
    if (cloudOn && username && cloudLoadedRef.current && json !== lastSyncedRef.current) {
      lastSyncedRef.current = json;
      fbDb.collection("users").doc(username).set({ data: json, updatedAt: Date.now() }).catch((e) => console.error("cloud save failed", e));
    }
  }, [followups, settings, pending, deadlines, loaded, username]);

  // sign in invisibly (anonymous) so the database isn't wide open
  useEffect(() => {
    if (!cloudOn) return;
    fbAuth.signInAnonymously().then(() => setAuthReady(true)).catch((e) => { console.error("anon sign-in failed", e); setAuthReady(true); });
  }, []);

  // sync this username's data from the cloud
  useEffect(() => {
    if (!cloudOn || !username || !authReady) return;
    cloudLoadedRef.current = false;
    const ref = fbDb.collection("users").doc(username);
    const unsub = ref.onSnapshot((snap) => {
      const remote = snap.exists ? snap.data().data : null;
      if (remote == null) {
        const json = JSON.stringify({ followups, settings, pending, deadlines });
        lastSyncedRef.current = json;
        ref.set({ data: json, updatedAt: Date.now() }).catch(() => {});
      } else if (remote !== lastSyncedRef.current) {
        lastSyncedRef.current = remote;
        try {
          const p = JSON.parse(remote);
          setFollowups(p.followups || []);
          setSettings({ ...DEFAULT_SETTINGS, ...(p.settings || {}) });
          setPending(p.pending || []);
          setDeadlines(p.deadlines || []);
        } catch (e) { /* ignore */ }
      }
      cloudLoadedRef.current = true;
    }, (err) => console.error("cloud sync error", err));
    return () => unsub();
  }, [username, authReady]);

  const chooseUsername = () => {
    const u = usernameInput.trim().toLowerCase();
    if (!u) return;
    lastSyncedRef.current = ""; cloudLoadedRef.current = false;
    try { localStorage.setItem(USER_KEY, u); } catch (e) {}
    setUsername(u);
  };
  const switchUser = () => {
    try { localStorage.removeItem(USER_KEY); } catch (e) {}
    lastSyncedRef.current = ""; cloudLoadedRef.current = false;
    setUsernameInput(""); setUsername("");
  };

  const flash = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2200); };

  const fillTokens = (str, f) =>
    str
      .split("{name}").join(f.name || "there")
      .split("{subject}").join(f.subject || "our previous correspondence")
      .split("{notes}").join(f.notes || "the requested documents")
      .split("{signature}").join(settings.signature || "");

  const buildBody = (f, seedOverride) => {
    if (f.customBody && f.customBody.trim()) return fillTokens(f.customBody, f);
    if (settings.mode === "fixed") return fillTokens(settings.template, f);
    const pool = VARIANTS[settings.tone] || VARIANTS.warm;
    const base = (seedOverride != null ? seedOverride : hashStr(f.id) + (f.followUpsSent || 0)) >>> 0;
    const isFirst = (f.followUpsSent || 0) === 0;
    const greet = pick(pool.greet, base);
    const open = pick(isFirst ? pool.openFirst : pool.openAgain, base + 1);
    const ask = pick(pool.ask, base + 2);
    const close = pick(pool.close, base + 3);
    const body = [greet, open + " " + ask, close, settings.signature || ""].join("\n\n");
    return fillTokens(body, f);
  };

  const openInEmail = (f) => {
    const params = [];
    const ccList = (f.cc || "").split(/[;,]/).map((s) => s.trim()).filter(Boolean);
    if (ccList.length) params.push("cc=" + encodeURIComponent(ccList.join(",")));
    params.push("subject=" + encodeURIComponent(f.subject || "Following up"));
    params.push("body=" + encodeURIComponent(buildBody(f)));
    const link = "mailto:" + encodeURIComponent(f.email) + "?" + params.join("&");
    try { window.open(link, "_blank"); } catch (e) { window.location.href = link; }
  };

  const copyText = async (f) => {
    const lines = ["To: " + f.email];
    const ccClean = (f.cc || "").split(/[;,]/).map((s) => s.trim()).filter(Boolean).join("; ");
    if (ccClean) lines.push("Cc: " + ccClean);
    lines.push("Subject: " + (f.subject || "Following up"));
    const text = lines.join("\n") + "\n\n" + buildBody(f);
    try { await navigator.clipboard.writeText(text); flash("Email text copied to clipboard"); }
    catch (e) { flash("Couldn't copy — select the preview manually"); }
  };

  const reminderDateFor = (f) => {
    const due = addDays(f.lastContact, Number(f.intervalDays) || 0);
    return daysBetween(todayStr(), due) > 0 ? due : addDays(todayStr(), 1);
  };

  const eventLines = (f) => {
    const remindStr = reminderDateFor(f);
    const start = new Date(remindStr + "T09:00:00");
    const end = new Date(start.getTime() + 30 * 60000);
    const who = f.name || f.email;
    const summary = "Follow up: " + who + (f.company ? " (" + f.company + ")" : "") + (f.subject ? " — " + f.subject : "");
    return { remindStr, start, end, who, summary };
  };

  const triggerDownload = (filename, text) => {
    const blob = new Blob([text], { type: "text/calendar;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  };

  const triggerBlobDownload = (filename, blob) => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1500);
  };

  const downloadStoredFiles = async (files) => {
    for (const fl of (files || [])) {
      try {
        const blob = await idbGet(fl.fileId);
        if (blob) { triggerBlobDownload(fl.name, blob); await new Promise((r) => setTimeout(r, 400)); }
      } catch (e) { /* skip */ }
    }
  };

  const renderFiles = (files) => (files && files.length > 0) ? (
    <div className="fd-files">
      {files.map((fl) => (
        <button key={fl.fileId} type="button" className="fd-file-chip" onClick={() => setPreviewFile(fl)} title="Preview">
          <FileText size={13} /> {fl.name}
        </button>
      ))}
    </div>
  ) : null;

  const slug = (f) => (f.name || f.email).replace(/[^a-z0-9]+/gi, "-").toLowerCase();

  const buildIcs = (f) => {
    const { start, end, who, summary } = eventLines(f);
    const desc = [];
    if (f.subject) desc.push("Subject: " + f.subject);
    if (f.notes) desc.push("Awaiting: " + f.notes);
    desc.push("To: " + f.email);
    if (f.cc && f.cc.trim()) desc.push("Cc: " + f.cc.trim());
    if (f.attachments && f.attachments.trim()) desc.push("Attach: " + f.attachments.trim());
    desc.push("(Reminder created by The Follow-Up Desk.)");
    return [
      "BEGIN:VCALENDAR",
      "VERSION:2.0",
      "PRODID:-//The Follow-Up Desk//EN",
      "CALSCALE:GREGORIAN",
      "METHOD:PUBLISH",
      "BEGIN:VEVENT",
      "UID:" + f.id + "@followup-desk",
      "SEQUENCE:" + (Number(f.followUpsSent) || 0),
      "DTSTAMP:" + icsStamp(),
      "DTSTART:" + icsLocal(start),
      "DTEND:" + icsLocal(end),
      "SUMMARY:" + icsEscape(summary),
      "DESCRIPTION:" + icsEscape(desc.join("\n")),
      "BEGIN:VALARM",
      "ACTION:DISPLAY",
      "DESCRIPTION:" + icsEscape("Follow-up reminder: " + who),
      "TRIGGER:-PT0M",
      "END:VALARM",
      "END:VEVENT",
      "END:VCALENDAR",
    ].join("\r\n");
  };

  const buildIcsCancel = (f) => {
    const { start, end, who, summary } = eventLines(f);
    return [
      "BEGIN:VCALENDAR",
      "VERSION:2.0",
      "PRODID:-//The Follow-Up Desk//EN",
      "CALSCALE:GREGORIAN",
      "METHOD:CANCEL",
      "BEGIN:VEVENT",
      "UID:" + f.id + "@followup-desk",
      "SEQUENCE:" + ((Number(f.followUpsSent) || 0) + 1),
      "DTSTAMP:" + icsStamp(),
      "DTSTART:" + icsLocal(start),
      "DTEND:" + icsLocal(end),
      "SUMMARY:" + icsEscape(summary),
      "STATUS:CANCELLED",
      "END:VEVENT",
      "END:VCALENDAR",
    ].join("\r\n");
  };

  const downloadIcs = (f, silent) => {
    try {
      triggerDownload("follow-up-" + slug(f) + ".ics", buildIcs(f));
      if (!silent) flash("Reminder set for " + prettyDate(reminderDateFor(f)) + " — open the file to add it to Outlook");
      return true;
    } catch (e) {
      if (!silent) flash("Couldn't create the reminder file");
      return false;
    }
  };

  const cancelReminder = (f) => {
    try {
      triggerDownload("follow-up-" + slug(f) + "-cancel.ics", buildIcsCancel(f));
      return true;
    } catch (e) {
      return false;
    }
  };

  const remindOnly = (f) => {
    if (downloadIcs(f)) setFollowups((arr) => arr.map((x) => (x.id === f.id ? { ...x, reminded: true } : x)));
  };

  const logFollowUp = (f) => {
    const updated = { ...f, lastContact: todayStr(), followUpsSent: (f.followUpsSent || 0) + 1, reminded: true };
    downloadIcs(updated, true);   // refresh the reminder to the new due date (no toast)
    openInEmail(f);               // compose the email using the current wording
    if (f.files && f.files.length) downloadStoredFiles(f.files);  // send stored files to Downloads for attaching
    setFollowups((arr) => arr.map((x) => (x.id === f.id ? updated : x)));
    const fileNote = f.files && f.files.length
      ? " — " + f.files.length + " file" + (f.files.length > 1 ? "s" : "") + " downloading to attach"
      : (f.attachments && f.attachments.trim() ? " — remember to attach: " + f.attachments.trim() : "");
    flash(fileNote ? "Sent & logged" + fileNote : "Sent & logged — reminder updated to " + prettyDate(reminderDateFor(updated)));
  };

  const markDone = (f) => {
    const hadReminder = !!f.reminded;
    if (hadReminder) cancelReminder(f);
    setFollowups((arr) => arr.map((x) => (x.id === f.id ? { ...x, status: "done", reminded: false } : x)));
    flash(hadReminder ? "Marked done — open the cancellation file to clear the Outlook reminder" : "Marked done");
  };
  const reactivate = (id) => setFollowups((arr) => arr.map((x) => (x.id === id ? { ...x, status: "active", lastContact: todayStr() } : x)));
  const remove = (id) => {
    const f = followups.find((x) => x.id === id);
    if (f && f.files) f.files.forEach((fl) => idbDelete(fl.fileId));
    setFollowups((arr) => arr.filter((x) => x.id !== id));
  };

  const startEdit = (f) => {
    setForm({ name: f.name, company: f.company || "", email: f.email, cc: f.cc || "", subject: f.subject, notes: f.notes, customBody: f.customBody || "", attachments: f.attachments || "", files: f.files || [], lastContact: f.lastContact, intervalDays: f.intervalDays });
    setEditingId(f.id); setShowForm(true);
  };

  const submit = () => {
    if (!form.email.trim()) return flash("An email address is required");
    if (editingId) {
      setFollowups((arr) => arr.map((x) => (x.id === editingId ? { ...x, ...form } : x)));
      flash("Updated");
    } else {
      setFollowups((arr) => [...arr, { ...form, id: Date.now().toString(36), status: "active", followUpsSent: 0, createdAt: todayStr() }]);
      flash("Added to your follow-up list");
    }
    setForm(blankForm()); setEditingId(null); setShowForm(false);
  };

  const resetAll = () => {
    if (!window.confirm("Delete every tracked follow-up? This can't be undone.")) return;
    setFollowups([]); flash("Cleared");
  };

  const startEditPending = (p) => {
    setPForm({
      title: p.title || "", dateSent: p.dateSent || todayStr(), category: p.category || "requisition",
      jobNumber: p.jobNumber || "", jobName: p.jobName || "", attachment: p.attachment || "",
      sentTo: p.sentTo || "", sentToEmail: p.sentToEmail || "", files: p.files || [],
    });
    setEditingPendingId(p.id); setShowPendingForm(true);
  };

  const submitPending = () => {
    if (!pForm.title.trim()) return flash("A document title is required");
    if (editingPendingId) {
      setPending((arr) => arr.map((x) => (x.id === editingPendingId ? { ...x, ...pForm } : x)));
      flash("Updated");
    } else {
      setPending((arr) => [...arr, { ...pForm, id: Date.now().toString(36), createdAt: todayStr() }]);
      flash("Added to pending signatures");
    }
    setPForm(blankPForm()); setEditingPendingId(null); setShowPendingForm(false);
  };

  const removePending = (id) => {
    const p = pending.find((x) => x.id === id);
    if (p && p.files) p.files.forEach((fl) => idbDelete(fl.fileId));
    setPending((arr) => arr.filter((x) => x.id !== id));
  };
  const markSigned = (p) => { removePending(p.id); flash("Marked as signed and removed from pending"); };

  const createFollowUpFromPending = async (p) => {
    const copied = [];
    for (const fl of (p.files || [])) {
      try {
        const blob = await idbGet(fl.fileId);
        if (blob) { const nid = newFileId(); await idbPut(nid, blob); copied.push({ ...fl, fileId: nid }); }
      } catch (e) { /* skip */ }
    }
    const jobNum = (p.jobNumber || "").trim();
    const jobNm = (p.jobName || "").trim();
    const jobLabel = jobNum && jobNm ? "Job " + jobNum + " (" + jobNm + ")"
      : jobNum ? "Job " + jobNum
      : jobNm ? jobNm : "";
    const title = (p.title || "the document").trim();
    const subject = p.title
      ? (p.title + (jobLabel ? " — " + jobLabel : ""))
      : (jobLabel || "Signature follow-up");
    const notes = "the signed " + title + (jobLabel ? " for " + jobLabel : "");
    const fu = {
      id: Date.now().toString(36),
      name: p.sentTo || "", company: jobLabel, email: p.sentToEmail || "", cc: "",
      subject: subject, notes: notes,
      customBody: "", attachments: p.attachment || "", files: copied,
      lastContact: p.dateSent || todayStr(), intervalDays: settings.defaultInterval,
      status: "active", followUpsSent: 0, createdAt: todayStr(),
    };
    setFollowups((arr) => [...arr, fu]);
    flash("Added to Follow-ups: " + (p.sentTo || p.sentToEmail || "new follow-up"));
  };

  const sortPending = (items) => {
    const f = pendingSort.field, dir = pendingSort.dir === "asc" ? 1 : -1;
    return [...items].sort((a, b) => {
      if (f === "jobNumber") {
        const an = parseFloat(a.jobNumber), bn = parseFloat(b.jobNumber);
        if (!isNaN(an) && !isNaN(bn)) return (an - bn) * dir;
      }
      return String(a[f] || "").localeCompare(String(b[f] || "")) * dir;
    });
  };

  // ----- deadlines -----
  const startEditDeadline = (d) => {
    setDForm({ title: d.title || "", dueDate: d.dueDate || todayStr(), leadDays: d.leadDays || 3, notes: d.notes || "" });
    setEditingDeadlineId(d.id); setShowDeadlineForm(true);
  };
  const submitDeadline = () => {
    if (!dForm.title.trim()) return flash("A deadline title is required");
    if (editingDeadlineId) {
      setDeadlines((arr) => arr.map((x) => (x.id === editingDeadlineId ? { ...x, ...dForm } : x)));
      flash("Updated");
    } else {
      setDeadlines((arr) => [...arr, { ...dForm, id: Date.now().toString(36), createdAt: todayStr() }]);
      flash("Deadline added");
    }
    setDForm(blankDForm()); setEditingDeadlineId(null); setShowDeadlineForm(false);
  };
  const removeDeadline = (id) => setDeadlines((arr) => arr.filter((x) => x.id !== id));

  const deadlineStatus = (d) => {
    const diff = daysBetween(todayStr(), d.dueDate);
    if (diff < 0) return { key: "overdue", days: -diff, color: "#9c3d28", label: "Overdue" };
    if (diff === 0) return { key: "today", color: "#b5791f", label: "Due today" };
    if (diff <= (Number(d.leadDays) || 0)) return { key: "soon", days: diff, color: "#b5791f", label: "Due soon" };
    return { key: "upcoming", days: diff, color: "#5f6f54", label: "Upcoming" };
  };

  const buildDeadlineIcs = (d) => {
    const start = new Date(d.dueDate + "T09:00:00");
    const end = new Date(start.getTime() + 30 * 60000);
    const lead = Math.max(0, Number(d.leadDays) || 0);
    const desc = [];
    if (d.notes) desc.push(d.notes);
    desc.push("(Deadline reminder from The Follow-Up Desk.)");
    return [
      "BEGIN:VCALENDAR", "VERSION:2.0", "PRODID:-//The Follow-Up Desk//EN", "CALSCALE:GREGORIAN", "METHOD:PUBLISH",
      "BEGIN:VEVENT",
      "UID:deadline-" + d.id + "@followup-desk",
      "SEQUENCE:0",
      "DTSTAMP:" + icsStamp(),
      "DTSTART:" + icsLocal(start),
      "DTEND:" + icsLocal(end),
      "SUMMARY:" + icsEscape("Deadline: " + (d.title || "")),
      "DESCRIPTION:" + icsEscape(desc.join("\n")),
      "BEGIN:VALARM", "ACTION:DISPLAY",
      "DESCRIPTION:" + icsEscape("Deadline approaching: " + (d.title || "")),
      "TRIGGER:-P" + lead + "D",
      "END:VALARM",
      "END:VEVENT", "END:VCALENDAR",
    ].join("\r\n");
  };
  const downloadDeadlineReminder = (d) => {
    try {
      triggerDownload("deadline-" + (d.title || "reminder").replace(/[^a-z0-9]+/gi, "-").toLowerCase() + ".ics", buildDeadlineIcs(d));
      flash("Reminder set for " + prettyDate(d.dueDate) + (d.leadDays ? " (alert " + d.leadDays + "d before)" : "") + " — open it to add to Outlook");
    } catch (e) { flash("Couldn't create the reminder file"); }
  };

  const sortedDeadlines = [...deadlines].sort((a, b) => String(a.dueDate).localeCompare(String(b.dueDate)));
  const deadlineCounts = useMemo(() => {
    let overdue = 0, soon = 0;
    deadlines.forEach((d) => { const s = deadlineStatus(d); if (s.key === "overdue") overdue++; else if (s.key === "soon" || s.key === "today") soon++; });
    return { overdue, soon, total: deadlines.length, attention: overdue + soon };
  }, [deadlines]);

  // ----- calendar events -----
  const calEvents = useMemo(() => {
    const ev = [];
    followups.forEach((f) => {
      if (f.status === "done") return;
      ev.push({ date: addDays(f.lastContact, Number(f.intervalDays) || 0), type: "followup", section: "followups", label: (f.company || f.name || f.email) });
    });
    deadlines.forEach((d) => ev.push({ date: d.dueDate, type: "deadline", section: "deadlines", label: d.title }));
    pending.forEach((p) => { if (p.dateSent) ev.push({ date: p.dateSent, type: "pending", section: "pending", label: p.title + (p.sentTo ? " → " + p.sentTo : "") }); });
    return ev;
  }, [followups, deadlines, pending]);
  const eventsOn = (dateStr) => calEvents.filter((e) => e.date === dateStr);


  const enriched = useMemo(() =>
    followups.map((f) => ({ ...f, _s: getStatus(f) })).sort((a, b) => {
      const w = sortWeight[a._s.key] - sortWeight[b._s.key];
      if (w !== 0) return w;
      if (a._s.due && b._s.due) return parseDate(a._s.due) - parseDate(b._s.due);
      return 0;
    }), [followups]);

  const counts = useMemo(() => {
    let attention = 0, waiting = 0, done = 0;
    enriched.forEach((f) => {
      if (f._s.key === "overdue" || f._s.key === "today") attention++;
      else if (f._s.key === "waiting") waiting++;
      else if (f._s.key === "done") done++;
    });
    return { attention, waiting, done };
  }, [enriched]);

  const filtered = enriched.filter((f) => {
    if (view === "all") return true;
    if (view === "attention") return f._s.key === "overdue" || f._s.key === "today";
    if (view === "waiting") return f._s.key === "waiting";
    if (view === "done") return f._s.key === "done";
    return true;
  });

  const contacts = useMemo(() => {
    const map = new Map();
    const add = (email, name, company) => {
      const e = (email || "").trim();
      if (!e) return;
      const key = e.toLowerCase();
      const existing = map.get(key);
      if (!existing) map.set(key, { email: e, name: name || "", company: company || "" });
      else {
        if (!existing.name && name) existing.name = name;
        if (!existing.company && company) existing.company = company;
      }
    };
    followups.forEach((f) => {
      add(f.email, f.name, f.company);
      (f.cc || "").split(/[;,]/).forEach((c) => add(c.trim(), "", ""));
    });
    pending.forEach((p) => add(p.sentToEmail, p.sentTo, ""));
    return Array.from(map.values()).sort((a, b) => (a.name || a.email).localeCompare(b.name || b.email));
  }, [followups, pending]);

  const pendingCounts = useMemo(() => {
    let req = 0, co = 0;
    pending.forEach((p) => { if (p.category === "changeorder") co++; else req++; });
    return { req, co, total: pending.length };
  }, [pending]);

  const reqItems = sortPending(pending.filter((p) => p.category !== "changeorder"));
  const coItems = sortPending(pending.filter((p) => p.category === "changeorder"));

  const renderPending = (p) => {
    const cat = PENDING_CATS[p.category] || PENDING_CATS.requisition;
    return (
      <article className="fd-card" key={p.id}>
        <div className="fd-card-bar" style={{ background: cat.color }} />
        <div className="fd-card-body">
          <div className="fd-card-top">
            <div className="fd-who">
              <span className="fd-name">{p.title}</span>
              {(p.jobNumber || p.jobName) && <span className="fd-company">{[p.jobNumber, p.jobName].filter(Boolean).join(" · ")}</span>}
            </div>
            <span className="fd-badge" style={{ color: cat.color, borderColor: cat.color }}>{cat.label}</span>
          </div>
          <div className="fd-notes">Sent to {p.sentTo || "—"}{p.sentToEmail ? " · " + p.sentToEmail : ""}</div>
          {p.attachment && p.attachment.trim() && <div className="fd-notes">Attachment: {p.attachment}</div>}
          {renderFiles(p.files)}
          <div className="fd-meta"><span>Sent {p.dateSent ? prettyDate(p.dateSent) : "—"}</span></div>
          <div className="fd-actions">
            <button className="fd-btn primary sm" onClick={() => createFollowUpFromPending(p)}><Send size={14} /> Create follow-up</button>
            <button className="fd-btn ghost sm" onClick={() => markSigned(p)}><Check size={14} /> Mark signed</button>
            <div className="fd-spacer" />
            <button className="fd-icon-btn sm" title="Edit" onClick={() => startEditPending(p)}><Pencil size={15} /></button>
            <button className="fd-icon-btn sm danger" title="Delete" onClick={() => removePending(p.id)}><Trash2 size={15} /></button>
          </div>
        </div>
      </article>
    );
  };

  const tabs = [
    { id: "attention", label: "Needs attention", n: counts.attention },
    { id: "waiting", label: "Waiting", n: counts.waiting },
    { id: "done", label: "Done", n: counts.done },
    { id: "all", label: "All", n: enriched.length },
  ];

  if (cloudOn && !authReady) {
    return <div className="fd-root"><div className="fd-auth"><div className="fd-empty">Connecting…</div></div></div>;
  }
  if (cloudOn && !username) {
    return (
      <div className="fd-root">
        <div className="fd-auth">
          <div className="fd-auth-box">
            <img src={LOGO_SRC} alt="BDI Construction" style={{ height: 44, width: "auto", display: "block", marginBottom: 18 }} />
            <div className="fd-kicker">THE FOLLOW-UP DESK</div>
            <h1 className="fd-title" style={{ fontSize: 30, margin: "0 0 6px" }}>Enter your username</h1>
            <p className="fd-sub" style={{ marginBottom: 18 }}>Use the same username on each device and your data follows you — no password needed.</p>
            <label className="fd-label">Username</label>
            <input className="fd-input" value={usernameInput} autoFocus
              onChange={(e) => setUsernameInput(e.target.value)} placeholder="e.g. daniel"
              onKeyDown={(e) => { if (e.key === "Enter") chooseUsername(); }} />
            <button className="fd-btn primary" style={{ width: "100%", justifyContent: "center", marginTop: 16 }} onClick={chooseUsername}>Continue</button>
            <p className="fd-sub" style={{ fontSize: 12, marginTop: 14 }}>Tip: set this first on the device that already has your data. Anyone using the same username sees this data, so pick something only you'll use.</p>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="fd-root">
      <div className="fd-wrap">
        <div className="fd-brand">
          <img src={LOGO_SRC} alt="BDI Construction" className="fd-logo" />
        </div>
        <header className="fd-head">
          <div>
            <div className="fd-kicker">{{ pending: "DOCUMENT TRACKER", deadlines: "TIME-SENSITIVE", calendar: "MONTH AT A GLANCE" }[section] || "CORRESPONDENCE LEDGER"}</div>
            <h1 className="fd-title">{{ pending: "Pending Signatures", deadlines: "Deadlines", calendar: "Calendar" }[section] || "The Follow-Up Desk"}</h1>
            <p className="fd-sub">
              {{
                pending: "Documents you've sent out that are still awaiting a signature.",
                deadlines: "Track time-sensitive due dates and get a heads-up as they approach.",
                calendar: "Every upcoming follow-up and deadline on one calendar.",
              }[section] || "Track who still owes you documents. The desk tells you exactly who's due, writes the note, and opens it in your mail app in one click."}
            </p>

                cells.push(
                  <div key={ds} className={"fd-cal-cell" + (isToday ? " today" : "") + (isSel ? " sel" : "")} onClick={() => setCalSelected(ds)}>
                    <span className="fd-cal-day">{day}</span>
                    <div className="fd-cal-dots">
                      {evs.slice(0, 4).map((e, i) => <span key={i} className="fd-dotmark" style={{ background: CAL_COLORS[e.type] }} />)}
                    </div>
                  </div>
                );
              }
              return cells;
            })()}
          </div>

          {calSelected && (
            <div className="fd-cal-day-list">
              <div className="fd-group-head">{prettyDate(calSelected)}</div>
              {eventsOn(calSelected).length === 0
                ? <div className="fd-empty" style={{ padding: "20px" }}><p>Nothing scheduled.</p></div>
                : eventsOn(calSelected).map((e, i) => (
                  <button className="fd-cal-event" key={i} onClick={() => setSection(e.section)} title={"Go to " + e.section}>
                    <span className="fd-dotmark" style={{ background: CAL_COLORS[e.type] }} />
                    <span className="fd-cal-event-type">{e.type === "followup" ? "Follow-up" : e.type === "deadline" ? "Deadline" : "Sent"}</span>
                    <span className="fd-cal-event-label">{e.label}</span>
                    <ChevronRight size={14} />
                  </button>
                ))}
            </div>
          )}
        </>
        )}

        <footer className="fd-foot">
          <Mail size={13} /> “Send follow-up” opens your default mail app (set Outlook as your default to
          compose there), pre-filled and ready to review before you hit send. Your list is saved in this
          browser.
        </footer>
      </div>

      {previewFile && <FilePreviewModal file={previewFile} onClose={() => setPreviewFile(null)} />}
      {toast && <div className="fd-toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<FollowUpDesk />);
</script>
</body>
</html>
