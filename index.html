  const blankDForm = () => ({ title: "", dueDate: todayStr(), leadDays: 3, notes: "" });
  const [dForm, setDForm] = useState(blankDForm());

  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORE_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        setFollowups(parsed.followups || []);
        setSettings({ ...DEFAULT_SETTINGS, ...(parsed.settings || {}) });
        setPending(parsed.pending || []);
        setDeadlines(parsed.deadlines || []);
        setPersonalApps(parsed.personalApps || []);
      }
    } catch (e) { /* first run */ }
    setLoaded(true);
  }, []);

  useEffect(() => {
    if (!loaded) return;
    const json = JSON.stringify({ followups, settings, pending, deadlines, personalApps });
    try { localStorage.setItem(STORE_KEY, json); }
    catch (e) { console.error("save failed", e); }
    if (cloudOn && user && cloudLoadedRef.current && json !== lastSyncedRef.current) {
      lastSyncedRef.current = json;
      fbDb.collection("users").doc(user.uid).set({ data: json, updatedAt: Date.now() }).catch((e) => console.error("cloud save failed", e));
    }
  }, [followups, settings, pending, deadlines, loaded, user, personalApps]);

  // watch email/password sign-in state
  useEffect(() => {
    if (!cloudOn) return;
    const unsub = fbAuth.onAuthStateChanged((u) => { setUser(u); setAuthReady(true); });
    return () => unsub();
  }, []);

  // sync this account's data from the cloud (keyed to the signed-in user)
  useEffect(() => {
    if (!cloudOn || !user) return;
    cloudLoadedRef.current = false;
    const ref = fbDb.collection("users").doc(user.uid);
    const unsub = ref.onSnapshot((snap) => {
      const remote = snap.exists ? snap.data().data : null;
      if (remote == null) {
        // brand-new account: push whatever is on this device up (migrates existing data)
        const json = JSON.stringify({ followups, settings, pending, deadlines, personalApps });
        lastSyncedRef.current = json;
        ref.set({ data: json, updatedAt: Date.now() }).catch(() => {});
      } else if (remote !== lastSyncedRef.current) {
        lastSyncedRef.current = remote;
        try {
          const p = JSON.parse(remote);
          setFollowups(p.followups || []);
          setSettings({ ...DEFAULT_SETTINGS, ...(p.settings || {}) });
          setPending(p.pending || []);
          setDeadlines(p.deadlines || []);
          setPersonalApps(p.personalApps || []);
        } catch (e) { /* ignore */ }
      }
      cloudLoadedRef.current = true;
    }, (err) => console.error("cloud sync error", err));
    return () => unsub();
  }, [user]);

  // read the company-wide shared config (everyone reads; only admins write)
  useEffect(() => {
    if (!cloudOn || !user) return;
    const ref = fbDb.collection("shared").doc("appConfig");
    const unsub = ref.onSnapshot((snap) => {
      if (snap.exists && snap.data().data) {
        try {
          const c = JSON.parse(snap.data().data);
          sharedSyncedRef.current = snap.data().data;
          setSharedConfig({ tabs: c.tabs || {}, customTabs: c.customTabs || [], overrides: c.overrides || {} });
        } catch (e) { /* ignore */ }
      }
    }, (err) => console.error("shared config read error", err));
    return () => unsub();
  }, [user]);

  const doAuth = () => {
    const email = authEmail.trim();
    if (!email || !authPass) { setAuthErr("Enter your email and password."); return; }
    if (authMode === "signup" && authPass.length < 6) { setAuthErr("Password must be at least 6 characters."); return; }
    setAuthErr(""); setAuthBusy(true);
    lastSyncedRef.current = ""; cloudLoadedRef.current = false;
    const p = authMode === "signup"
      ? fbAuth.createUserWithEmailAndPassword(email, authPass)
      : fbAuth.signInWithEmailAndPassword(email, authPass);
    p.then(() => { setAuthPass(""); })
      .catch((e) => setAuthErr(friendlyAuthError(e)))
      .finally(() => setAuthBusy(false));
  };
  const signOut = () => {
    if (!fbAuth) return;
    lastSyncedRef.current = ""; cloudLoadedRef.current = false;
    fbAuth.signOut();
  };
  const resetPass = () => {
    const email = authEmail.trim();
    if (!email) { setAuthErr("Type your email above first, then tap reset."); return; }
    fbAuth.sendPasswordResetEmail(email)
      .then(() => { setAuthErr(""); flash("Password reset email sent to " + email); })
      .catch((e) => setAuthErr(friendlyAuthError(e)));
  };

  const flash = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2200); };

  const fillTokens = (str, f) =>
    str
      .split("{name}").join(f.name || "there")
      .split("{subject}").join(f.subject || "our previous correspondence")
      .split("{notes}").join(f.notes || "the requested documents")
      .split("{signature}").join(settings.signature || "");

  const buildBody = (f, seedOverride) => {
    if (f.customBody && f.customBody.trim()) return fillTokens(f.customBody, f);
    if (settings.mode === "fixed") return fillTokens(settings.template, f);
    const pool = VARIANTS[settings.tone] || VARIANTS.warm;
    const base = (seedOverride != null ? seedOverride : hashStr(f.id) + (f.followUpsSent || 0)) >>> 0;
    const isFirst = (f.followUpsSent || 0) === 0;
    const greet = pick(pool.greet, base);
    const open = pick(isFirst ? pool.openFirst : pool.openAgain, base + 1);
    const ask = pick(pool.ask, base + 2);
    const close = pick(pool.close, base + 3);
    const body = [greet, open + " " + ask, close, settings.signature || ""].join("\n\n");
    return fillTokens(body, f);
  };

  const openInEmail = (f) => {
    const params = [];
    const ccList = (f.cc || "").split(/[;,]/).map((s) => s.trim()).filter(Boolean);
    if (ccList.length) params.push("cc=" + encodeURIComponent(ccList.join(",")));
    params.push("subject=" + encodeURIComponent(f.subject || "Following up"));
    params.push("body=" + encodeURIComponent(buildBody(f)));
    const link = "mailto:" + encodeURIComponent(f.email) + "?" + params.join("&");
    try { window.open(link, "_blank"); } catch (e) { window.location.href = link; }
  };

  const copyText = async (f) => {
    const lines = ["To: " + f.email];
    const ccClean = (f.cc || "").split(/[;,]/).map((s) => s.trim()).filter(Boolean).join("; ");
    if (ccClean) lines.push("Cc: " + ccClean);
    lines.push("Subject: " + (f.subject || "Following up"));
    const text = lines.join("\n") + "\n\n" + buildBody(f);
    try { await navigator.clipboard.writeText(text); flash("Email text copied to clipboard"); }
    catch (e) { flash("Couldn't copy — select the preview manually"); }
  };

  const reminderDateFor = (f) => {
    const due = addDays(f.lastContact, Number(f.intervalDays) || 0);
    return daysBetween(todayStr(), due) > 0 ? due : addDays(todayStr(), 1);
  };

  const eventLines = (f) => {
    const remindStr = reminderDateFor(f);
    const start = new Date(remindStr + "T09:00:00");
    const end = new Date(start.getTime() + 30 * 60000);
    const who = f.name || f.email;
    const summary = "Follow up: " + who + (f.company ? " (" + f.company + ")" : "") + (f.subject ? " — " + f.subject : "");
    return { remindStr, start, end, who, summary };
  };

  const triggerDownload = (filename, text) => {
    const blob = new Blob([text], { type: "text/calendar;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  };

  const triggerBlobDownload = (filename, blob) => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1500);
  };

  const downloadStoredFiles = async (files) => {
    for (const fl of (files || [])) {
      try {
        const blob = await idbGet(fl.fileId);
        if (blob) { triggerBlobDownload(fl.name, blob); await new Promise((r) => setTimeout(r, 400)); }
      } catch (e) { /* skip */ }
    }
  };

  const renderFiles = (files) => (files && files.length > 0) ? (
    <div className="fd-files">
      {files.map((fl) => (
        <button key={fl.fileId} type="button" className="fd-file-chip" onClick={() => setPreviewFile(fl)} title="Preview">
          <FileText size={13} /> {fl.name}
        </button>
      ))}
    </div>
  ) : null;

  const slug = (f) => (f.name || f.email).replace(/[^a-z0-9]+/gi, "-").toLowerCase();

  const buildIcs = (f) => {
    const { start, end, who, summary } = eventLines(f);
    const desc = [];
    if (f.subject) desc.push("Subject: " + f.subject);
    if (f.notes) desc.push("Awaiting: " + f.notes);
    desc.push("To: " + f.email);
    if (f.cc && f.cc.trim()) desc.push("Cc: " + f.cc.trim());
    if (f.attachments && f.attachments.trim()) desc.push("Attach: " + f.attachments.trim());
    desc.push("(Reminder created by The Follow-Up Desk.)");
    return [
      "BEGIN:VCALENDAR",
      "VERSION:2.0",
      "PRODID:-//The Follow-Up Desk//EN",
      "CALSCALE:GREGORIAN",
      "METHOD:PUBLISH",
      "BEGIN:VEVENT",
      "UID:" + f.id + "@followup-desk",
      "SEQUENCE:" + (Number(f.followUpsSent) || 0),
      "DTSTAMP:" + icsStamp(),
      "DTSTART:" + icsLocal(start),
      "DTEND:" + icsLocal(end),
      "SUMMARY:" + icsEscape(summary),
      "DESCRIPTION:" + icsEscape(desc.join("\n")),
      "BEGIN:VALARM",
      "ACTION:DISPLAY",
      "DESCRIPTION:" + icsEscape("Follow-up reminder: " + who),
      "TRIGGER:-PT0M",
      "END:VALARM",
      "END:VEVENT",
      "END:VCALENDAR",
    ].join("\r\n");
  };

  const buildIcsCancel = (f) => {
    const { start, end, who, summary } = eventLines(f);
    return [
      "BEGIN:VCALENDAR",
      "VERSION:2.0",
      "PRODID:-//The Follow-Up Desk//EN",
      "CALSCALE:GREGORIAN",
      "METHOD:CANCEL",
      "BEGIN:VEVENT",
      "UID:" + f.id + "@followup-desk",
      "SEQUENCE:" + ((Number(f.followUpsSent) || 0) + 1),
      "DTSTAMP:" + icsStamp(),
      "DTSTART:" + icsLocal(start),
      "DTEND:" + icsLocal(end),
      "SUMMARY:" + icsEscape(summary),
      "STATUS:CANCELLED",
      "END:VEVENT",
      "END:VCALENDAR",
    ].join("\r\n");
  };

  const downloadIcs = (f, silent) => {
    try {
      triggerDownload("follow-up-" + slug(f) + ".ics", buildIcs(f));
      if (!silent) flash("Reminder set for " + prettyDate(reminderDateFor(f)) + " — open the file to add it to Outlook");
      return true;
    } catch (e) {
      if (!silent) flash("Couldn't create the reminder file");
      return false;
    }
  };

  const cancelReminder = (f) => {
    try {
      triggerDownload("follow-up-" + slug(f) + "-cancel.ics", buildIcsCancel(f));
      return true;
    } catch (e) {
      return false;
    }
  };

  const remindOnly = (f) => {
    if (downloadIcs(f)) setFollowups((arr) => arr.map((x) => (x.id === f.id ? { ...x, reminded: true } : x)));
  };

  const logFollowUp = (f) => {
    const updated = { ...f, lastContact: todayStr(), followUpsSent: (f.followUpsSent || 0) + 1, reminded: true };
    downloadIcs(updated, true);   // refresh the reminder to the new due date (no toast)
    openInEmail(f);               // compose the email using the current wording
    if (f.files && f.files.length) downloadStoredFiles(f.files);  // send stored files to Downloads for attaching
    setFollowups((arr) => arr.map((x) => (x.id === f.id ? updated : x)));
    const fileNote = f.files && f.files.length
      ? " — " + f.files.length + " file" + (f.files.length > 1 ? "s" : "") + " downloading to attach"
      : (f.attachments && f.attachments.trim() ? " — remember to attach: " + f.attachments.trim() : "");
    flash(fileNote ? "Sent & logged" + fileNote : "Sent & logged — reminder updated to " + prettyDate(reminderDateFor(updated)));
  };

  const markDone = (f) => {
    const hadReminder = !!f.reminded;
    if (hadReminder) cancelReminder(f);
    setFollowups((arr) => arr.map((x) => (x.id === f.id ? { ...x, status: "done", reminded: false } : x)));
    flash(hadReminder ? "Marked done — open the cancellation file to clear the Outlook reminder" : "Marked done");
  };
  const reactivate = (id) => setFollowups((arr) => arr.map((x) => (x.id === id ? { ...x, status: "active", lastContact: todayStr() } : x)));
  const remove = (id) => {
    const f = followups.find((x) => x.id === id);
    if (f && f.files) f.files.forEach((fl) => idbDelete(fl.fileId));
    setFollowups((arr) => arr.filter((x) => x.id !== id));
  };

  const startEdit = (f) => {
    setForm({ name: f.name, company: f.company || "", email: f.email, cc: f.cc || "", subject: f.subject, notes: f.notes, customBody: f.customBody || "", attachments: f.attachments || "", files: f.files || [], lastContact: f.lastContact, intervalDays: f.intervalDays });
    setEditingId(f.id); setShowForm(true);
  };

  const submit = () => {
    if (!form.email.trim()) return flash("An email address is required");
    if (editingId) {
      setFollowups((arr) => arr.map((x) => (x.id === editingId ? { ...x, ...form } : x)));
      flash("Updated");
    } else {
      setFollowups((arr) => [...arr, { ...form, id: Date.now().toString(36), status: "active", followUpsSent: 0, createdAt: todayStr() }]);
      flash("Added to your follow-up list");
    }
    setForm(blankForm()); setEditingId(null); setShowForm(false);
  };

  const resetAll = () => {
    if (!window.confirm("Delete every tracked follow-up? This can't be undone.")) return;
    setFollowups([]); flash("Cleared");
  };

  const startEditPending = (p) => {
    setPForm({
      title: p.title || "", dateSent: p.dateSent || todayStr(), category: p.category || "requisition",
      jobNumber: p.jobNumber || "", jobName: p.jobName || "", attachment: p.attachment || "",
      sentTo: p.sentTo || "", sentToEmail: p.sentToEmail || "", files: p.files || [],
    });
    setEditingPendingId(p.id); setShowPendingForm(true);
  };

  const submitPending = () => {
    if (!pForm.title.trim()) return flash("A document title is required");
    if (editingPendingId) {
      setPending((arr) => arr.map((x) => (x.id === editingPendingId ? { ...x, ...pForm } : x)));
      flash("Updated");
    } else {
      setPending((arr) => [...arr, { ...pForm, id: Date.now().toString(36), createdAt: todayStr() }]);
      flash("Added to pending signatures");
    }
    setPForm(blankPForm()); setEditingPendingId(null); setShowPendingForm(false);
  };

  const removePending = (id) => {
    const p = pending.find((x) => x.id === id);
    if (p && p.files) p.files.forEach((fl) => idbDelete(fl.fileId));
    setPending((arr) => arr.filter((x) => x.id !== id));
  };
  const markSigned = (p) => { removePending(p.id); flash("Marked as signed and removed from pending"); };

  const createFollowUpFromPending = async (p) => {
    const copied = [];
    for (const fl of (p.files || [])) {
      try {
        const blob = await idbGet(fl.fileId);
        if (blob) { const nid = newFileId(); await idbPut(nid, blob); copied.push({ ...fl, fileId: nid }); }
      } catch (e) { /* skip */ }
    }
    const jobNum = (p.jobNumber || "").trim();
    const jobNm = (p.jobName || "").trim();
    const jobLabel = jobNum && jobNm ? "Job " + jobNum + " (" + jobNm + ")"
      : jobNum ? "Job " + jobNum
      : jobNm ? jobNm : "";
    const title = (p.title || "the document").trim();
    const subject = p.title
      ? (p.title + (jobLabel ? " — " + jobLabel : ""))
      : (jobLabel || "Signature follow-up");
    const notes = "the signed " + title + (jobLabel ? " for " + jobLabel : "");
    const fu = {
      id: Date.now().toString(36),
      name: p.sentTo || "", company: jobLabel, email: p.sentToEmail || "", cc: "",
      subject: subject, notes: notes,
      customBody: "", attachments: p.attachment || "", files: copied,
      lastContact: p.dateSent || todayStr(), intervalDays: settings.defaultInterval,
      status: "active", followUpsSent: 0, createdAt: todayStr(),
    };
    setFollowups((arr) => [...arr, fu]);
    flash("Added to Follow-ups: " + (p.sentTo || p.sentToEmail || "new follow-up"));
  };

  const sortPending = (items) => {
    const f = pendingSort.field, dir = pendingSort.dir === "asc" ? 1 : -1;
    return [...items].sort((a, b) => {
      if (f === "jobNumber") {
        const an = parseFloat(a.jobNumber), bn = parseFloat(b.jobNumber);
        if (!isNaN(an) && !isNaN(bn)) return (an - bn) * dir;
      }
      return String(a[f] || "").localeCompare(String(b[f] || "")) * dir;
    });
  };

  // ----- deadlines -----
  const startEditDeadline = (d) => {
    setDForm({ title: d.title || "", dueDate: d.dueDate || todayStr(), leadDays: d.leadDays || 3, notes: d.notes || "" });
    setEditingDeadlineId(d.id); setShowDeadlineForm(true);
  };
  const submitDeadline = () => {
    if (!dForm.title.trim()) return flash("A deadline title is required");
    if (editingDeadlineId) {
      setDeadlines((arr) => arr.map((x) => (x.id === editingDeadlineId ? { ...x, ...dForm } : x)));
      flash("Updated");
    } else {
      setDeadlines((arr) => [...arr, { ...dForm, id: Date.now().toString(36), createdAt: todayStr() }]);
      flash("Deadline added");
    }
    setDForm(blankDForm()); setEditingDeadlineId(null); setShowDeadlineForm(false);
  };
  const removeDeadline = (id) => setDeadlines((arr) => arr.filter((x) => x.id !== id));

  const deadlineStatus = (d) => {
    const diff = daysBetween(todayStr(), d.dueDate);
    if (diff < 0) return { key: "overdue", days: -diff, color: "#9c3d28", label: "Overdue" };
    if (diff === 0) return { key: "today", color: "#b5791f", label: "Due today" };
    if (diff <= (Number(d.leadDays) || 0)) return { key: "soon", days: diff, color: "#b5791f", label: "Due soon" };
    return { key: "upcoming", days: diff, color: "#5f6f54", label: "Upcoming" };
  };

  const buildDeadlineIcs = (d) => {
    const start = new Date(d.dueDate + "T09:00:00");
    const end = new Date(start.getTime() + 30 * 60000);
    const lead = Math.max(0, Number(d.leadDays) || 0);
    const desc = [];
    if (d.notes) desc.push(d.notes);
    desc.push("(Deadline reminder from The Follow-Up Desk.)");
    return [
      "BEGIN:VCALENDAR", "VERSION:2.0", "PRODID:-//The Follow-Up Desk//EN", "CALSCALE:GREGORIAN", "METHOD:PUBLISH",
      "BEGIN:VEVENT",
      "UID:deadline-" + d.id + "@followup-desk",
      "SEQUENCE:0",
      "DTSTAMP:" + icsStamp(),
      "DTSTART:" + icsLocal(start),
      "DTEND:" + icsLocal(end),
      "SUMMARY:" + icsEscape("Deadline: " + (d.title || "")),
      "DESCRIPTION:" + icsEscape(desc.join("\n")),
      "BEGIN:VALARM", "ACTION:DISPLAY",
      "DESCRIPTION:" + icsEscape("Deadline approaching: " + (d.title || "")),
      "TRIGGER:-P" + lead + "D",
      "END:VALARM",
      "END:VEVENT", "END:VCALENDAR",
    ].join("\r\n");
  };
  const downloadDeadlineReminder = (d) => {
    try {
      triggerDownload("deadline-" + (d.title || "reminder").replace(/[^a-z0-9]+/gi, "-").toLowerCase() + ".ics", buildDeadlineIcs(d));
      flash("Reminder set for " + prettyDate(d.dueDate) + (d.leadDays ? " (alert " + d.leadDays + "d before)" : "") + " — open it to add to Outlook");
    } catch (e) { flash("Couldn't create the reminder file"); }
  };

  const buildBirthdayIcs = (b) => {
    const yr = new Date().getFullYear();
    const mmdd = String(b.m).padStart(2, "0") + String(b.d).padStart(2, "0");
    const uid = "birthday-" + b.n.replace(/[^a-z0-9]+/gi, "-").toLowerCase() + "@followup-desk";
    return [
      "BEGIN:VCALENDAR", "VERSION:2.0", "PRODID:-//The Follow-Up Desk//EN", "CALSCALE:GREGORIAN", "METHOD:PUBLISH",
      "BEGIN:VEVENT",
      "UID:" + uid,
      "SEQUENCE:0",
      "DTSTAMP:" + icsStamp(),
      "DTSTART;VALUE=DATE:" + yr + mmdd,
      "DTEND;VALUE=DATE:" + yr + mmdd,
      "RRULE:FREQ=YEARLY",
      "SUMMARY:" + icsEscape(b.n + "'s Birthday"),
      "DESCRIPTION:" + icsEscape("BDI birthday (from The Follow-Up Desk)."),
      "BEGIN:VALARM", "ACTION:DISPLAY",
      "DESCRIPTION:" + icsEscape(b.n + "'s birthday today"),
      "TRIGGER:-P0D",
      "END:VALARM",
      "END:VEVENT", "END:VCALENDAR",
    ].join("\r\n");
  };
  const downloadBirthday = (b) => {
    try {
      triggerDownload("birthday-" + b.n.replace(/[^a-z0-9]+/gi, "-").toLowerCase() + ".ics", buildBirthdayIcs(b));
      flash(b.n + "'s birthday — open the file to add it to Outlook (repeats yearly)");
    } catch (e) { flash("Couldn't create the birthday file"); }
  };

  const sortedDeadlines = [...deadlines].sort((a, b) => String(a.dueDate).localeCompare(String(b.dueDate)));
  const deadlineCounts = useMemo(() => {
    let overdue = 0, soon = 0;
    deadlines.forEach((d) => { const s = deadlineStatus(d); if (s.key === "overdue") overdue++; else if (s.key === "soon" || s.key === "today") soon++; });
    return { overdue, soon, total: deadlines.length, attention: overdue + soon };
  }, [deadlines]);

  // ----- calendar events -----
  const calEvents = useMemo(() => {
    const ev = [];
    followups.forEach((f) => {
      if (f.status === "done") return;
      ev.push({ date: addDays(f.lastContact, Number(f.intervalDays) || 0), type: "followup", section: "followups", label: (f.company || f.name || f.email) });
    });
    deadlines.forEach((d) => ev.push({ date: d.dueDate, type: "deadline", section: "deadlines", label: d.title }));
    pending.forEach((p) => { if (p.dateSent) ev.push({ date: p.dateSent, type: "pending", section: "pending", label: p.title + (p.sentTo ? " → " + p.sentTo : "") }); });
    return ev;
  }, [followups, deadlines, pending]);
  const eventsOn = (dateStr) => {
    const base = calEvents.filter((e) => e.date === dateStr);
    const parts = dateStr.split("-");
    const mm = Number(parts[1]), dd = Number(parts[2]);
    BIRTHDAYS.forEach((b) => {
      if (b.m === mm && b.d === dd) base.push({ date: dateStr, type: "birthday", section: "birthdays", label: b.n });
    });
    return base;
  };


  const enriched = useMemo(() =>
    followups.map((f) => ({ ...f, _s: getStatus(f) })).sort((a, b) => {
      const w = sortWeight[a._s.key] - sortWeight[b._s.key];
      if (w !== 0) return w;
      if (a._s.due && b._s.due) return parseDate(a._s.due) - parseDate(b._s.due);
      return 0;
    }), [followups]);

  const counts = useMemo(() => {
    let attention = 0, waiting = 0, done = 0;
    enriched.forEach((f) => {
      if (f._s.key === "overdue" || f._s.key === "today") attention++;
      else if (f._s.key === "waiting") waiting++;
      else if (f._s.key === "done") done++;
    });
    return { attention, waiting, done };
  }, [enriched]);

  const filtered = enriched.filter((f) => {
    if (view === "all") return true;
    if (view === "attention") return f._s.key === "overdue" || f._s.key === "today";
    if (view === "waiting") return f._s.key === "waiting";
    if (view === "done") return f._s.key === "done";
    return true;
  });

  const contacts = useMemo(() => {
    const map = new Map();
    const add = (email, name, company) => {
      const e = (email || "").trim();
      if (!e) return;
      const key = e.toLowerCase();
      const existing = map.get(key);
      if (!existing) map.set(key, { email: e, name: name || "", company: company || "" });
      else {
        if (!existing.name && name) existing.name = name;
        if (!existing.company && company) existing.company = company;
      }
    };
    followups.forEach((f) => {
      add(f.email, f.name, f.company);
      (f.cc || "").split(/[;,]/).forEach((c) => add(c.trim(), "", ""));
    });
    pending.forEach((p) => add(p.sentToEmail, p.sentTo, ""));
    return Array.from(map.values()).sort((a, b) => (a.name || a.email).localeCompare(b.name || b.email));
  }, [followups, pending]);

  const pendingCounts = useMemo(() => {
    let req = 0, co = 0;
    pending.forEach((p) => { if (p.category === "changeorder") co++; else req++; });
    return { req, co, total: pending.length };
  }, [pending]);

  const reqItems = sortPending(pending.filter((p) => p.category !== "changeorder"));
  const coItems = sortPending(pending.filter((p) => p.category === "changeorder"));

  const renderPending = (p) => {
    const cat = PENDING_CATS[p.category] || PENDING_CATS.requisition;
    return (
      <article className="fd-card" key={p.id}>
        <div className="fd-card-bar" style={{ background: cat.color }} />
        <div className="fd-card-body">
          <div className="fd-card-top">
            <div className="fd-who">
              <span className="fd-name">{p.title}</span>
              {(p.jobNumber || p.jobName) && <span className="fd-company">{[p.jobNumber, p.jobName].filter(Boolean).join(" · ")}</span>}
            </div>
            <span className="fd-badge" style={{ color: cat.color, borderColor: cat.color }}>{cat.label}</span>
          </div>
          <div className="fd-notes">Sent to {p.sentTo || "—"}{p.sentToEmail ? " · " + p.sentToEmail : ""}</div>
          {p.attachment && p.attachment.trim() && <div className="fd-notes">Attachment: {p.attachment}</div>}
          {renderFiles(p.files)}
          <div className="fd-meta"><span>Sent {p.dateSent ? prettyDate(p.dateSent) : "—"}</span></div>
          <div className="fd-actions">
            <button className="fd-btn primary sm" onClick={() => createFollowUpFromPending(p)}><Send size={14} /> Create follow-up</button>
            <button className="fd-btn ghost sm" onClick={() => markSigned(p)}><Check size={14} /> Mark signed</button>
            <div className="fd-spacer" />
            <button className="fd-icon-btn sm" title="Edit" onClick={() => startEditPending(p)}><Pencil size={15} /></button>
            <button className="fd-icon-btn sm danger" title="Delete" onClick={() => removePending(p.id)}><Trash2 size={15} /></button>
          </div>
        </div>
      </article>
    );
  };

  const tabs = [
    { id: "attention", label: "Needs attention", n: counts.attention },
    { id: "waiting", label: "Waiting", n: counts.waiting },
    { id: "done", label: "Done", n: counts.done },
    { id: "all", label: "All", n: enriched.length },
  ];

  if (cloudOn && !authReady) {
    return <div className="fd-root"><div className="fd-auth"><div className="fd-empty">Connecting…</div></div></div>;
  }
  if (cloudOn && !user) {
    return (
      <div className="fd-root">
        <div className="fd-auth">
          <div className="fd-auth-box">
            <img src={LOGO_SRC} alt="BDI Construction" style={{ height: 56, width: "auto", display: "block", marginBottom: 20 }} />
            <div className="fd-kicker">THE FOLLOW-UP DESK</div>
            <h1 className="fd-title" style={{ fontSize: 30, margin: "0 0 6px" }}>{authMode === "signup" ? "Create account" : "Sign in"}</h1>
            <p className="fd-sub" style={{ marginBottom: 18 }}>{authMode === "signup" ? "Make an account to sync your follow-ups, documents, and deadlines across devices." : "Sign in to load your data on any device."}</p>
            <label className="fd-label">Email</label>
            <input className="fd-input" type="email" autoComplete="username" value={authEmail} autoFocus
              onChange={(e) => setAuthEmail(e.target.value)} placeholder="you@bdico.com"
              onKeyDown={(e) => { if (e.key === "Enter") doAuth(); }} />
            <label className="fd-label" style={{ marginTop: 12 }}>Password</label>
            <input className="fd-input" type="password" autoComplete={authMode === "signup" ? "new-password" : "current-password"} value={authPass}
              onChange={(e) => setAuthPass(e.target.value)} placeholder="••••••••"
              onKeyDown={(e) => { if (e.key === "Enter") doAuth(); }} />
            {authErr ? <div className="fd-auth-err">{authErr}</div> : null}
            <button className="fd-btn primary" style={{ width: "100%", justifyContent: "center", marginTop: 16 }} onClick={doAuth} disabled={authBusy}>
              {authBusy ? "Please wait…" : (authMode === "signup" ? "Create account" : "Sign in")}
            </button>
            {authMode === "signin" ? <button className="fd-auth-toggle" onClick={resetPass}>Forgot password?</button> : null}
            <button className="fd-auth-toggle" onClick={() => { setAuthErr(""); setAuthMode(authMode === "signup" ? "signin" : "signup"); }}>
              {authMode === "signup" ? "Already have an account? Sign in" : "Need an account? Create one"}
            </button>
          </div>
        </div>
      </div>
    );
  }

  const saveSharedConfig = (next) => {
    setSharedConfig(next);
    if (!cloudOn || !user) return;
    const json = JSON.stringify(next);
    sharedSyncedRef.current = json;
    fbDb.collection("shared").doc("appConfig").set({ data: json, updatedAt: Date.now() })
      .then(() => flash("Saved for everyone"))
      .catch((e) => { console.error(e); flash("Couldn't save — make sure the admin rule is published"); });
  };
  const toggleTab = (key) => {
    const tabs = { ...sharedConfig.tabs, [key]: sharedConfig.tabs[key] === false ? true : false };
    saveSharedConfig({ ...sharedConfig, tabs });
  };
  const addCustomTab = () => {
    const nm = adminNewTab.trim();
    if (!nm) return;
    const id = "ct_" + Math.random().toString(36).slice(2, 8);
    saveSharedConfig({ ...sharedConfig, customTabs: [...sharedConfig.customTabs, { id, name: nm, links: [] }] });
    setAdminNewTab("");
  };
  const deleteCustomTab = (id) => {
    saveSharedConfig({ ...sharedConfig, customTabs: sharedConfig.customTabs.filter((t) => t.id !== id) });
    if (section === id) setSection("calendar");
  };
  const addLink = (tabId) => {
    const d = linkDrafts[tabId] || {};
    const raw = (d.url || "").trim();
    if (!raw) return;
    const full = /^https?:\/\//i.test(raw) ? raw : "https://" + raw;
    const dom = domainFromUrl(full);
    const link = { name: (d.name || "").trim() || dom || "Link", url: full, domain: dom };
    const customTabs = sharedConfig.customTabs.map((t) => t.id === tabId ? { ...t, links: [...t.links, link] } : t);
    saveSharedConfig({ ...sharedConfig, customTabs });
    setLinkDrafts((prev) => ({ ...prev, [tabId]: { name: "", url: "" } }));
  };
  const removeLink = (tabId, idx) => {
    const customTabs = sharedConfig.customTabs.map((t) => t.id === tabId ? { ...t, links: t.links.filter((_, i) => i !== idx) } : t);
    saveSharedConfig({ ...sharedConfig, customTabs });
  };
  const addPerson = () => {
    const em = adminNewPerson.trim().toLowerCase();
    if (!em || em.indexOf("@") < 0) { flash("Enter a valid email"); return; }
    const overrides = { ...(sharedConfig.overrides || {}) };
    if (!overrides[em]) overrides[em] = {};
    saveSharedConfig({ ...sharedConfig, overrides });
    setAdminNewPerson("");
  };
  const removePerson = (email) => {
    const overrides = { ...(sharedConfig.overrides || {}) };
    delete overrides[email];
    saveSharedConfig({ ...sharedConfig, overrides });
  };
  const setPersonTab = (email, key, value) => {
    const overrides = { ...(sharedConfig.overrides || {}) };
    overrides[email] = { ...(overrides[email] || {}), [key]: value };
    saveSharedConfig({ ...sharedConfig, overrides });
  };

  const addPersonalApp = (name, rawUrl) => {
    const raw = (rawUrl || "").trim();
    if (!raw) return;
    const full = /^https?:\/\//i.test(raw) ? raw : "https://" + raw;
    const dom = domainFromUrl(full);
    const nm = (name || "").trim() || dom || "App";
    setPersonalApps((prev) => [...prev, { name: nm, url: full, domain: dom, personal: true }]);
    setAppName(""); setAppUrl("");
  };
  const removePersonalApp = (idx) => setPersonalApps((prev) => prev.filter((_, i) => i !== idx));
  const onAppDrop = (e) => {
    e.preventDefault(); setAppDragOver(false);
    const dt = e.dataTransfer; if (!dt) return;
    let url = (dt.getData("text/uri-list") || dt.getData("text/plain") || dt.getData("URL") || "").trim();
    url = (url.split("\n").find((l) => l && l.indexOf("#") !== 0) || url).trim();
    if (url) addPersonalApp("", url);
  };

  const isAdmin = !!(user && user.email && ADMINS.indexOf(user.email.toLowerCase()) >= 0);
  const myOverride = (user && user.email && (sharedConfig.overrides || {})[user.email.toLowerCase()]) || {};
  const tabVisible = (key) => {
    if (myOverride[key] !== undefined) return myOverride[key] !== false;
    return sharedConfig.tabs[key] !== false;
  };
  const activeCustomTab = sharedConfig.customTabs.find((t) => t.id === section);
  const inCalGroup = section === "calendar" || section === "followups" || section === "pending" || section === "deadlines";

  return (
    <div className="fd-root">
      <div className="fd-wrap">
        <div className="fd-brand">
          <img src={LOGO_SRC} alt="BDI Construction" className="fd-logo" />
        </div>
        <header className="fd-head">
          <div>
            <div className="fd-kicker">{activeCustomTab ? "BDI CONSTRUCTION" : ({ pending: "DOCUMENT TRACKER", deadlines: "TIME-SENSITIVE", calendar: "MONTH AT A GLANCE", officelist: "BDI CONSTRUCTION", birthdays: "BDI CONSTRUCTION", apps: "BDI CONSTRUCTION", admin: "ADMIN CONTROLS" }[section] || "CORRESPONDENCE LEDGER")}</div>
            <h1 className="fd-title">{activeCustomTab ? activeCustomTab.name : ({ pending: "Pending Signatures", deadlines: "Deadlines", calendar: "Calendar", officelist: "Employee Office List", birthdays: "Birthdays", apps: "Company Apps", admin: "Admin" }[section] || "The Follow-Up Desk")}</h1>
            <p className="fd-sub">
              {activeCustomTab ? "Shortcuts set up by your admin." : ({
                pending: "Documents you've sent out that are still awaiting a signature.",
                deadlines: "Track time-sensitive due dates and get a heads-up as they approach.",
                calendar: "Every upcoming follow-up and deadline on one calendar.",
                officelist: "Company contact directory — extensions, cell numbers, and emails.",
                birthdays: "Everyone's birthday, plotted on the calendar so you never miss one.",
                apps: "Quick links to the tools BDI uses — tap any one to jump straight in.",
                admin: "Control what everyone sees and add company-wide tabs. Changes apply to all users.",
              }[section] || "Track who still owes you documents. The desk tells you exactly who's due, writes the note, and opens it in your mail app in one click.")}
            </p>
          </div>
          <div className="fd-head-actions">
            {user && (
              <button className="fd-icon-btn" title={"Sign out" + (user.email ? " (" + user.email + ")" : "")} onClick={signOut}>
                <LogOut size={18} />
              </button>
            )}
            {section === "followups" && (
              <button className="fd-icon-btn" title="Settings" onClick={() => setShowSettings((s) => !s)}>
                <SettingsIcon size={18} />
              </button>
            )}
          </div>
        </header>

        <div className="fd-nav">
          <button className={"fd-nav-btn" + (inCalGroup ? " active" : "")} onClick={() => setSection("calendar")}>
            <Calendar size={15} /> Calendar{(counts.attention + deadlineCounts.attention) > 0 ? " (" + (counts.attention + deadlineCounts.attention) + ")" : ""}
          </button>
          {tabVisible("officelist") && (
            <button className={"fd-nav-btn" + (section === "officelist" ? " active" : "")} onClick={() => setSection("officelist")}>
              <Users size={15} /> Office list
            </button>
          )}
          {tabVisible("birthdays") && (
            <button className={"fd-nav-btn" + (section === "birthdays" ? " active" : "")} onClick={() => setSection("birthdays")}>
              <Cake size={15} /> Birthdays
            </button>
          )}
          {tabVisible("apps") && (
            <button className={"fd-nav-btn" + (section === "apps" ? " active" : "")} onClick={() => setSection("apps")}>
              <Grid size={15} /> Apps
            </button>
          )}
          {sharedConfig.customTabs.filter((t) => tabVisible(t.id)).map((t) => (
            <button key={t.id} className={"fd-nav-btn" + (section === t.id ? " active" : "")} onClick={() => setSection(t.id)}>
              <Grid size={15} /> {t.name}
            </button>
          ))}
          {isAdmin && (
            <button className={"fd-nav-btn" + (section === "admin" ? " active" : "")} onClick={() => setSection("admin")}>
              <Shield size={15} /> Admin
            </button>
          )}
        </div>

        {inCalGroup && (
          <div className="fd-subnav">
            <button className={"fd-subnav-btn" + (section === "calendar" ? " active" : "")} onClick={() => setSection("calendar")}>
              <Calendar size={14} /> Month
            </button>
            <button className={"fd-subnav-btn" + (section === "followups" ? " active" : "")} onClick={() => setSection("followups")}>
              <Mail size={14} /> Follow-ups{counts.attention > 0 ? " (" + counts.attention + ")" : ""}
            </button>
            <button className={"fd-subnav-btn" + (section === "pending" ? " active" : "")} onClick={() => setSection("pending")}>
              <FileText size={14} /> Pending signatures{pendingCounts.total > 0 ? " (" + pendingCounts.total + ")" : ""}
            </button>
            <button className={"fd-subnav-btn" + (section === "deadlines" ? " active" : "")} onClick={() => setSection("deadlines")}>
              <Flag size={14} /> Deadlines{deadlineCounts.attention > 0 ? " (" + deadlineCounts.attention + ")" : ""}
            </button>
          </div>
        )}

        {section === "followups" && (
        <>
        <div className="fd-stats">
          <Stat n={counts.attention} label="due for follow-up" tone="#9c3d28" />
          <Stat n={counts.waiting} label="awaiting reply" tone="#5f6f54" />
          <Stat n={counts.done} label="documents received" tone="#8a8073" />
        </div>

        {showSettings && (
          <section className="fd-panel">
            <div className="fd-panel-head">
              <span>Default message &amp; cadence</span>
              <button className="fd-icon-btn sm" onClick={() => setShowSettings(false)}><X size={16} /></button>
            </div>
            <label className="fd-label">Default days between follow-ups</label>
            <input className="fd-input short" type="number" min="1" value={settings.defaultInterval}
              onChange={(e) => setSettings((s) => ({ ...s, defaultInterval: Number(e.target.value) }))} />
            <label className="fd-label" style={{ marginTop: 14 }}>Email style</label>
            <div className="fd-seg">
              <button className={"fd-seg-btn" + (settings.mode === "varied" ? " active" : "")} onClick={() => setSettings((s) => ({ ...s, mode: "varied" }))}>Vary automatically</button>
              <button className={"fd-seg-btn" + (settings.mode === "fixed" ? " active" : "")} onClick={() => setSettings((s) => ({ ...s, mode: "fixed" }))}>Fixed template</button>
            </div>

            {settings.mode === "varied" ? (
              <>
                <label className="fd-label" style={{ marginTop: 14 }}>Register <span className="fd-hint">— all professional</span></label>
                <div className="fd-seg">
                  {TONE_ORDER.map((t) => (
                    <button key={t} className={"fd-seg-btn" + (settings.tone === t ? " active" : "")} onClick={() => setSettings((s) => ({ ...s, tone: t }))}>{TONE_LABELS[t]}</button>
                  ))}
                </div>
                <label className="fd-label" style={{ marginTop: 14 }}>Preview <span className="fd-hint">— a different wording each time</span></label>
                <div className="fd-preview">{buildBody(SAMPLE_RECIPIENT, previewSeed)}</div>
                <button className="fd-btn ghost sm" style={{ marginTop: 10 }} onClick={() => setPreviewSeed(previewSeed + 1)}><RotateCcw size={14} /> Show another</button>
              </>
            ) : (
              <>
                <label className="fd-label" style={{ marginTop: 14 }}>Message template <span className="fd-hint">— use {"{name}"}, {"{subject}"}, {"{notes}"}, {"{signature}"}</span></label>
                <textarea className="fd-input area" rows={6} value={settings.template}
                  onChange={(e) => setSettings((s) => ({ ...s, template: e.target.value }))} />
              </>
            )}
            <label className="fd-label">Signature</label>
            <textarea className="fd-input area" rows={2} value={settings.signature}
              onChange={(e) => setSettings((s) => ({ ...s, signature: e.target.value }))} />
            <div className="fd-panel-foot">
              <button className="fd-link-danger" onClick={resetAll}><RotateCcw size={14} /> Clear all data</button>
            </div>
          </section>
        )}

        <div className="fd-toolbar">
          <div className="fd-tabs">
            {tabs.map((t) => (
              <button key={t.id} className={"fd-tab" + (view === t.id ? " active" : "")} onClick={() => setView(t.id)}>
                {t.label}<span className="fd-tab-n">{t.n}</span>
              </button>
            ))}
          </div>
          <button className="fd-btn primary"
            onClick={() => { setForm(blankForm()); setEditingId(null); setShowForm((s) => !s); setShowSettings(false); }}>
            <Plus size={16} /> New follow-up
          </button>
        </div>

        {showForm && (
          <section className="fd-panel">
            <div className="fd-panel-head">
              <span>{editingId ? "Edit follow-up" : "Add a follow-up"}</span>
              <button className="fd-icon-btn sm" onClick={() => { setShowForm(false); setEditingId(null); }}><X size={16} /></button>
            </div>
            <div className="fd-grid">
              <div>
                <label className="fd-label">Recipient name</label>
                <input className="fd-input" value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} placeholder="Jordan Smith" />
              </div>
              <div>
                <label className="fd-label">Company <span className="fd-hint">— for your records only</span></label>
                <input className="fd-input" value={form.company} onChange={(e) => setForm({ ...form, company: e.target.value })} placeholder="Acme Corp" />
              </div>
              <div>
                <label className="fd-label">Email address *</label>
                <ContactField mode="single" value={form.email} contacts={contacts}
                  placeholder="jordan@company.com"
                  onChange={(v) => setForm((fm) => ({ ...fm, email: v }))}
                  onPick={(c) => setForm((fm) => ({ ...fm, email: c.email, name: fm.name || c.name || "", company: fm.company || c.company || "" }))} />
              </div>
              <div>
                <label className="fd-label">CC <span className="fd-hint">— optional, semicolon-separated</span></label>
                <ContactField mode="multi" value={form.cc} contacts={contacts}
                  placeholder="manager@company.com"
                  onChange={(v) => setForm((fm) => ({ ...fm, cc: v }))} />
              </div>
              <div>
                <label className="fd-label">Subject / context</label>
                <input className="fd-input" value={form.subject} onChange={(e) => setForm({ ...form, subject: e.target.value })} placeholder="Q2 onboarding paperwork" />
              </div>
              <div>
                <label className="fd-label">What you're waiting on</label>
                <input className="fd-input" value={form.notes} onChange={(e) => setForm({ ...form, notes: e.target.value })} placeholder="signed contract + ID copy" />
              </div>
              <div>
                <label className="fd-label">Date you last contacted them</label>
                <input className="fd-input" type="date" value={form.lastContact} onChange={(e) => setForm({ ...form, lastContact: e.target.value })} />
              </div>
              <div>
                <label className="fd-label">Remind me every (days)</label>
                <input className="fd-input" type="number" min="1" value={form.intervalDays} onChange={(e) => setForm({ ...form, intervalDays: Number(e.target.value) })} />
              </div>
            </div>
            <label className="fd-label" style={{ marginTop: 14 }}>Custom message <span className="fd-hint">— optional; replaces the auto-written email for this person. Tokens {"{name}"}, {"{subject}"}, {"{notes}"}, {"{signature}"} work here too.</span></label>
            <textarea className="fd-input area" rows={5} value={form.customBody}
              placeholder="Leave blank to use the automatic professional follow-up."
              onChange={(e) => setForm({ ...form, customBody: e.target.value })} />
            <label className="fd-label">Attachment notes <span className="fd-hint">— optional, comma-separated file names for reference</span></label>
            <input className="fd-input" value={form.attachments}
              placeholder="contract.pdf, W-9.pdf"
              onChange={(e) => setForm({ ...form, attachments: e.target.value })} />
            <label className="fd-label" style={{ marginTop: 14 }}>Files <span className="fd-hint">— drag &amp; drop to store and preview; they download on send for attaching</span></label>
            <FileDrop files={form.files} onChange={(fs) => setForm((fm) => ({ ...fm, files: fs }))} onPreview={setPreviewFile} />
            <div className="fd-form-foot">
              <button className="fd-btn ghost" onClick={() => { setShowForm(false); setEditingId(null); }}>Cancel</button>
              <button className="fd-btn primary" onClick={submit}>{editingId ? "Save changes" : "Add"}</button>
            </div>
          </section>
        )}

        <div className="fd-list">
          {!loaded && <div className="fd-empty">Loading your desk…</div>}

          {loaded && filtered.length === 0 && (
            <div className="fd-empty">
              <Inbox size={28} />
              <p>{view === "done" ? "Nothing finished yet." : "Nothing here. Add someone you're chasing for documents."}</p>
            </div>
          )}

          {loaded && filtered.map((f) => {
            const meta = STATUS_META[f._s.key];
            const Ic = meta.Icon;
            return (
              <article className="fd-card" key={f.id}>
                <div className="fd-card-bar" style={{ background: meta.color }} />
                <div className="fd-card-body">
                  <div className="fd-card-top">
                    <div className="fd-who">
                      {f.company ? (
                        <>
                          <span className="fd-company-lead">{f.company}</span>
                          <span className="fd-name-sub">{f.name || f.email}</span>
                        </>
                      ) : (
                        <span className="fd-name">{f.name || f.email}</span>
                      )}
                      {f.name && <span className="fd-email">{f.email}</span>}
                      {f.cc && <span className="fd-email">Cc: {f.cc}</span>}
                    </div>
                    <span className="fd-badge" style={{ color: meta.color, borderColor: meta.color }}>
                      <Ic size={13} />
                      {meta.label}
                      {f._s.key === "overdue" && (" · " + f._s.days + "d")}
                      {f._s.key === "waiting" && (" · " + f._s.days + "d left")}
                    </span>
                  </div>

                  {f.subject && <div className="fd-subject">{f.subject}</div>}
                  {f.notes && <div className="fd-notes">Awaiting: {f.notes}</div>}
                  {f.attachments && f.attachments.trim() && <div className="fd-notes">Attachments: {f.attachments}</div>}
                  {renderFiles(f.files)}
                  {f.customBody && f.customBody.trim() && <div className="fd-notes" style={{ fontStyle: "italic" }}>Custom message set for this follow-up</div>}

                  <div className="fd-meta">
                    <span>Last contact {prettyDate(f.lastContact)}</span>
                    <span className="fd-dot">·</span>
                    <span>Every {f.intervalDays}d</span>
                    {f.followUpsSent > 0 && (
                      <>
                        <span className="fd-dot">·</span>
                        <span>{f.followUpsSent} follow-up{f.followUpsSent > 1 ? "s" : ""} sent</span>
                      </>
                    )}
                  </div>

                  <div className="fd-actions">
                    {f.status !== "done" ? (
                      <>
                        <button className="fd-btn primary sm" onClick={() => logFollowUp(f)}><Send size={14} /> Send follow-up</button>
                        <button className="fd-btn ghost sm" onClick={() => copyText(f)}><Copy size={14} /> Copy text</button>
                        <button className="fd-btn ghost sm" onClick={() => remindOnly(f)}><CalendarClock size={14} /> Reminder only</button>
                        <button className="fd-btn ghost sm" onClick={() => markDone(f)}><Check size={14} /> Got documents</button>
                      </>
                    ) : (
                      <button className="fd-btn ghost sm" onClick={() => reactivate(f.id)}><RotateCcw size={14} /> Reopen</button>
                    )}
                    <div className="fd-spacer" />
                    <button className="fd-icon-btn sm" title="Edit" onClick={() => startEdit(f)}><Pencil size={15} /></button>
                    <button className="fd-icon-btn sm danger" title="Delete" onClick={() => remove(f.id)}><Trash2 size={15} /></button>
                  </div>
                </div>
              </article>
            );
          })}
        </div>
        </>
        )}

        {section === "pending" && (
        <>
          <div className="fd-stats">
            <Stat n={pendingCounts.req} label="requisitions pending" tone="#5f6f54" />
            <Stat n={pendingCounts.co} label="change orders pending" tone="#1f6cb0" />
            <Stat n={pendingCounts.total} label="documents total" tone="#8a8073" />
          </div>

          <div className="fd-toolbar">
            <div className="fd-tabs">
              {[
                { id: "all", label: "All", n: pendingCounts.total },
                { id: "requisition", label: "Requisitions", n: pendingCounts.req },

                : eventsOn(calSelected).map((e, i) => (
                  <button className="fd-cal-event" key={i} onClick={() => setSection(e.section)} title={"Go to " + e.section}>
                    <span className="fd-dotmark" style={{ background: CAL_COLORS[e.type] }} />
                    <span className="fd-cal-event-type">{e.type === "followup" ? "Follow-up" : e.type === "deadline" ? "Deadline" : e.type === "birthday" ? "Birthday" : "Sent"}</span>
                    <span className="fd-cal-event-label">{e.label}</span>
                    <ChevronRight size={14} />
                  </button>
                ))}
            </div>
          )}
        </>
        )}

        <footer className="fd-foot">
          <Mail size={13} /> “Send follow-up” opens your default mail app (set Outlook as your default to
          compose there), pre-filled and ready to review before you hit send. Your list is saved in this
          browser.
        </footer>
      </div>

      {previewFile && <FilePreviewModal file={previewFile} onClose={() => setPreviewFile(null)} />}
      {toast && <div className="fd-toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<FollowUpDesk />);
</script>
</body>
</html>
